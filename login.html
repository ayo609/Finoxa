<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finoxa • Sign In to Your Account</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #1a1a1a;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(249, 115, 22, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(239, 68, 68, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(245, 158, 11, 0.06) 0%, transparent 50%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow: hidden;
    }

    /* Floating glassmorphism elements */
    .glass-float {
      position: fixed;
      border-radius: 50%;
      background: rgba(249, 115, 22, 0.08);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(249, 115, 22, 0.15);
      animation: floatAround 20s infinite ease-in-out;
      pointer-events: none;
      z-index: 0;
    }

    .glass-float-1 {
      width: 350px;
      height: 350px;
      top: -100px;
      right: -80px;
      animation-delay: 0s;
    }

    .glass-float-2 {
      width: 250px;
      height: 250px;
      bottom: -80px;
      left: -60px;
      animation-delay: -7s;
      background: rgba(239, 68, 68, 0.06);
      border-color: rgba(239, 68, 68, 0.12);
    }

    .glass-float-3 {
      width: 180px;
      height: 180px;
      top: 40%;
      right: 15%;
      animation-delay: -14s;
      background: rgba(245, 158, 11, 0.05);
      border-color: rgba(245, 158, 11, 0.1);
    }

    .glass-float-4 {
      width: 200px;
      height: 200px;
      bottom: 30%;
      left: 20%;
      animation-delay: -10s;
      background: rgba(251, 146, 60, 0.04);
      border-color: rgba(251, 146, 60, 0.1);
    }

    @keyframes floatAround {
      0%, 100% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      25% {
        transform: translate(30px, -40px) rotate(5deg) scale(1.05);
      }
      50% {
        transform: translate(-20px, 30px) rotate(-3deg) scale(0.95);
      }
      75% {
        transform: translate(-35px, -25px) rotate(2deg) scale(1.02);
      }
    }

    /* Grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(249, 115, 22, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249, 115, 22, 0.04) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    /* Main container */
    .main-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    /* Logo section */
    .logo-section {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-hex {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.2) 0%, rgba(239, 68, 68, 0.15) 100%);
      border: 2px solid rgba(249, 115, 22, 0.3);
      border-radius: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin-bottom: 1.2rem;
      backdrop-filter: blur(15px);
      transform: rotate(-5deg);
      box-shadow: 0 10px 40px rgba(249, 115, 22, 0.15);
    }

    .brand-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fb923c 0%, #f87171 50%, #fbbf24 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .brand-motto {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.9rem;
      margin-top: 0.5rem;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    /* Login card - Glassmorphism */
    .login-card {
      background: rgba(28, 28, 28, 0.8);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 2.8rem 2.2rem;
      box-shadow: 
        0 25px 60px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(249, 115, 22, 0.1) inset,
        0 0 80px rgba(249, 115, 22, 0.05);
      position: relative;
      overflow: hidden;
    }

    /* Shine effect */
    .login-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent 40%,
        rgba(249, 115, 22, 0.03) 45%,
        rgba(251, 146, 60, 0.05) 50%,
        rgba(249, 115, 22, 0.03) 55%,
        transparent 60%
      );
      animation: shimmer 8s infinite linear;
      pointer-events: none;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    .login-card > * {
      position: relative;
      z-index: 1;
    }

    /* Card header */
    .card-header {
      margin-bottom: 2.2rem;
      text-align: center;
    }

    .card-header .welcome-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      display: block;
    }

    .card-header h2 {
      font-family: 'Space Grotesk', sans-serif;
      color: #ffffff;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .card-header p {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.88rem;
    }

    /* Form styling */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .field-group {
      position: relative;
    }

    .field-group label {
      display: block;
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .field-icon {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(249, 115, 22, 0.5);
      font-size: 0.95rem;
      z-index: 2;
      pointer-events: none;
      transition: color 0.3s;
    }

    .input-wrapper input {
      width: 100%;
      padding: 1rem 1.2rem 1rem 3rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #ffffff;
      font-size: 0.92rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all 0.3s;
      outline: none;
    }

    .input-wrapper input:focus {
      border-color: #fb923c;
      background: rgba(249, 115, 22, 0.06);
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.08);
    }

    .input-wrapper input:focus ~ .field-icon {
      color: #fb923c;
    }

    .input-wrapper input::placeholder {
      color: rgba(255, 255, 255, 0.2);
      font-weight: 400;
    }

    /* Password toggle */
    .pass-toggle {
      position: absolute;
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.3rem;
      transition: all 0.3s;
      z-index: 2;
    }

    .pass-toggle:hover {
      color: #fb923c;
    }

    /* Remember me & Forgot password */
    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: -0.3rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: #fb923c;
      cursor: pointer;
    }

    .forgot-link {
      color: #fb923c;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: color 0.3s;
    }

    .forgot-link:hover {
      color: #f97316;
      text-decoration: underline;
    }

    /* Submit button */
    .login-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #f97316 0%, #ef4444 100%);
      border: none;
      border-radius: 14px;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      box-shadow: 0 10px 30px rgba(249, 115, 22, 0.3);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(249, 115, 22, 0.45);
      background: linear-gradient(135deg, #fb923c 0%, #f87171 100%);
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    /* Register redirect */
    .register-redirect {
      text-align: center;
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.88rem;
    }

    .register-redirect a {
      color: #fb923c;
      text-decoration: none;
      font-weight: 700;
      margin-left: 0.3rem;
      transition: color 0.3s;
    }

    .register-redirect a:hover {
      color: #f97316;
    }

    /* Glass toast notification */
    .glass-toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 10000;
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 1.1rem 1.5rem;
      box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(249, 115, 22, 0.1) inset;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: toastSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      min-width: 320px;
      max-width: 450px;
    }

    .glass-toast.success {
      border-bottom: 3px solid #f59e0b;
    }

    .glass-toast.error {
      border-bottom: 3px solid #ef4444;
    }

    .glass-toast.warning {
      border-bottom: 3px solid #fb923c;
    }

    @keyframes toastSlideUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .toast-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      backdrop-filter: blur(10px);
    }

    .toast-icon.success {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .toast-icon.error {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .toast-icon.warning {
      background: rgba(249, 115, 22, 0.15);
      color: #fb923c;
      border: 1px solid rgba(249, 115, 22, 0.2);
    }

    .toast-content h4 {
      font-size: 0.9rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.15rem;
    }

    .toast-content p {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.4;
    }

    /* Loading spinner */
    .fa-spinner {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 500px) {
      .login-card {
        padding: 2rem 1.5rem;
        border-radius: 20px;
      }

      .brand-name {
        font-size: 2.3rem;
      }

      .logo-hex {
        width: 75px;
        height: 75px;
        font-size: 2rem;
      }

      .glass-toast {
        left: 1rem;
        right: 1rem;
        min-width: auto;
      }

      .options-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.8rem;
      }
    }
  </style>
</head>
<body>

  <!-- Floating glassmorphism elements -->
  <div class="glass-float glass-float-1"></div>
  <div class="glass-float glass-float-2"></div>
  <div class="glass-float glass-float-3"></div>
  <div class="glass-float glass-float-4"></div>

  <!-- Main content -->
  <div class="main-container">
    <!-- Logo & Brand -->
    <div class="logo-section">
      <div class="logo-hex">🔶</div>
      <h1 class="brand-name">Finoxa</h1>
      <p class="brand-motto">Welcome back to smart wealth</p>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="card-header">
        <span class="welcome-icon">👋</span>
        <h2>Sign In</h2>
        <p>Access your Finoxa account</p>
      </div>

      <form id="loginForm" class="login-form">
        <!-- Email -->
        <div class="field-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope field-icon"></i>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock field-icon"></i>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="pass-toggle" id="passwordToggle">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Remember me & Forgot password -->
        <div class="options-row">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="login-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>

        <!-- Divider -->
        <div class="divider">or</div>

        <!-- Register link -->
        <div class="register-redirect">
          Don't have an account? <a href="register.html">Create one now</a>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    // 🔥 FIREBASE IMPORTS
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // 🔥 FIREBASE CONFIGURATION
    const firebaseConfig = {
      apiKey: "AIzaSyAYw02OLQ-AOun_0YLzTd7DaCLsHQqHxGk",
      authDomain: "finexo-3afc7.firebaseapp.com",
      projectId: "finexo-3afc7",
      storageBucket: "finexo-3afc7.firebasestorage.app",
      messagingSenderId: "443358513817",
      appId: "1:443358513817:web:756f9aa5e02dc05ca84608"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 🔥 PASSWORD TOGGLE
    const passwordToggle = document.getElementById('passwordToggle');
    const passwordInput = document.getElementById('password');

    passwordToggle.addEventListener('click', () => {
      const icon = passwordToggle.querySelector('i');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    });

    // 🔥 TOAST NOTIFICATION
    function showToast(title, message, type = 'success') {
      const existing = document.querySelector('.glass-toast');
      if (existing) existing.remove();

      const icons = {
        success: 'fa-check-circle',
        error: 'fa-exclamation-circle',
        warning: 'fa-exclamation-triangle'
      };

      const toast = document.createElement('div');
      toast.className = `glass-toast ${type}`;
      toast.innerHTML = `
        <div class="toast-icon ${type}">
          <i class="fas ${icons[type]}"></i>
        </div>
        <div class="toast-content">
          <h4>${title}</h4>
          <p>${message}</p>
        </div>
      `;
      document.body.appendChild(toast);

      // Auto remove with fade
      setTimeout(() => {
        if (toast.parentNode) {
          toast.style.opacity = '0';
          toast.style.transform = 'translateY(30px) scale(0.95)';
          toast.style.transition = 'all 0.3s ease';
          setTimeout(() => toast.remove(), 300);
        }
      }, 5000);
    }

    // 🔥 CHECK FOR SAVED EMAIL (Remember Me)
    const savedEmail = localStorage.getItem('finoxa_email');
    if (savedEmail) {
      document.getElementById('email').value = savedEmail;
      document.getElementById('rememberMe').checked = true;
    }

    // 🔥 FORM SUBMISSION
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const loginBtn = document.getElementById('loginBtn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      // Basic validation
      if (!email) return showToast('Email Required', 'Please enter your email address', 'warning');
      if (!password) return showToast('Password Required', 'Please enter your password', 'warning');
      if (password.length < 8) return showToast('Invalid Password', 'Password must be at least 8 characters', 'error');

      // Disable button
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';

      try {
        // Set persistence based on "Remember Me"
        const persistenceType = rememberMe ? browserLocalPersistence : browserSessionPersistence;
        await setPersistence(auth, persistenceType);

        // Sign in
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Save email if "Remember Me" is checked
        if (rememberMe) {
          localStorage.setItem('finoxa_email', email);
        } else {
          localStorage.removeItem('finoxa_email');
        }

        // Update last login timestamp in Firestore
        try {
          const userRef = doc(db, 'users', user.uid);
          await updateDoc(userRef, {
            lastLogin: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
        } catch (firestoreError) {
          console.warn('Could not update last login:', firestoreError);
          // Non-critical error, continue with login
        }

        // Success!
        showToast('✅ Welcome Back!', 'Sign in successful. Redirecting...', 'success');

        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);

      } catch (error) {
        console.error('Login error:', error);

        let errorTitle = 'Login Failed';
        let errorMessage = 'Please try again.';

        // Handle specific Firebase errors
        switch (error.code) {
          case 'auth/invalid-email':
            errorMessage = 'Invalid email format. Please check.';
            break;
          case 'auth/user-not-found':
            errorMessage = 'No account found with this email.';
            break;
          case 'auth/wrong-password':
            errorMessage = 'Incorrect password. Please try again.';
            break;
          case 'auth/invalid-credential':
            errorMessage = 'Invalid email or password.';
            break;
          case 'auth/too-many-requests':
            errorTitle = 'Too Many Attempts';
            errorMessage = 'Please wait a moment before trying again.';
            break;
          case 'auth/user-disabled':
            errorMessage = 'This account has been disabled. Contact support.';
            break;
          case 'auth/network-request-failed':
            errorMessage = 'Network error. Check your connection.';
            break;
          default:
            errorMessage = 'An error occurred. Please try again.';
        }

        showToast(errorTitle, errorMessage, 'error');

        // Re-enable button
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      }
    });

    // 🔥 ENTER KEY SUPPORT
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && document.activeElement && document.activeElement.tagName === 'INPUT') {
        const form = document.getElementById('loginForm');
        if (form) form.dispatchEvent(new Event('submit'));
      }
    });

    console.log('✅ Finoxa Login Page Initialized');
    console.log('🔥 Firebase Config:', firebaseConfig.projectId);
  </script>
</body>
</html>
