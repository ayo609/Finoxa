<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Finoxa • Investment Plans</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1a1a1a;
      --orange: #f97316;
      --orange-light: #fb923c;
      --red: #ef4444;
      --amber: #f59e0b;
      --green: #22c55e;
      --text: #ffffff;
      --text2: #a0a0a0;
      --text3: #666666;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.04);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 100px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 0% 0%, rgba(249,115,22,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(239,68,68,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app-content {
      position: relative;
      z-index: 1;
      max-width: 650px;
      margin: 0 auto;
      padding: 1rem 1rem 100px;
    }

    /* Header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 0;
      margin-bottom: 1.2rem;
    }

    .back-link {
      width: 42px;
      height: 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      text-decoration: none;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .back-link:hover { border-color: rgba(255,255,255,0.2); color: #fff; }

    .page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .page-title i { color: var(--orange-light); }

    .wallet-mini {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.5rem 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .wallet-mini .wm-icon {
      color: var(--orange-light);
      font-size: 0.8rem;
    }

    .wallet-mini .wm-amount {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      color: #fff;
    }

    /* Info strip */
    .info-strip {
      background: linear-gradient(135deg, rgba(249,115,22,0.06), rgba(239,68,68,0.04));
      border: 1px solid rgba(249,115,22,0.12);
      border-radius: 14px;
      padding: 0.9rem 1.1rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .info-strip i {
      color: var(--amber);
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .info-strip span {
      font-size: 0.75rem;
      color: var(--text2);
      line-height: 1.4;
    }

    /* Plans list */
    .plans-list {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .plan-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.2rem 1.3rem;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }

    .plan-item:hover {
      border-color: rgba(249,115,22,0.2);
    }

    .plan-item.popular {
      border-color: rgba(249,115,22,0.25);
      background: linear-gradient(160deg, #1a1a1a 0%, #1f1f1f 100%);
    }

    .plan-item.popular .popular-tag {
      position: absolute;
      top: 10px;
      right: -28px;
      background: linear-gradient(135deg, #f97316, #ef4444);
      color: #fff;
      font-size: 0.55rem;
      font-weight: 800;
      padding: 0.2rem 2rem;
      transform: rotate(45deg);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .plan-icon-wrap {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .piw-1 { background: rgba(34,197,94,0.1); color: #4ade80; }
    .piw-2 { background: rgba(59,130,246,0.1); color: #60a5fa; }
    .piw-3 { background: rgba(239,68,68,0.1); color: #f87171; }
    .piw-4 { background: rgba(168,85,247,0.1); color: #a78bfa; }
    .piw-5 { background: rgba(249,115,22,0.15); color: #fb923c; }
    .piw-6 { background: rgba(245,158,11,0.1); color: #fbbf24; }
    .piw-7 { background: rgba(244,114,182,0.1); color: #f472b6; }
    .piw-8 { background: rgba(20,184,166,0.1); color: #2dd4bf; }
    .piw-9 { background: rgba(129,140,248,0.1); color: #818cf8; }
    .piw-10 { background: rgba(251,191,36,0.1); color: #fbbf24; }

    .plan-info {
      flex: 1;
      min-width: 0;
    }

    .plan-info .pi-name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .plan-info .pi-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .pi-meta span {
      font-size: 0.7rem;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .pi-meta span i {
      color: var(--orange-light);
      font-size: 0.65rem;
    }

    .plan-action {
      text-align: right;
      flex-shrink: 0;
    }

    .plan-action .pa-price {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .plan-action .pa-roi {
      font-size: 0.68rem;
      color: #4ade80;
      margin-bottom: 0.5rem;
    }

    .buy-btn {
      padding: 0.5rem 1.2rem;
      background: linear-gradient(135deg, #f97316, #ef4444);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .buy-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(249,115,22,0.3);
    }

    .buy-btn:disabled {
      background: rgba(255,255,255,0.05);
      color: var(--text3);
      cursor: not-allowed;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.8rem;
      width: 100%;
      max-width: 430px;
      animation: modalSlideUp 0.3s cubic-bezier(0.16,1,0.3,1);
    }

    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(25px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-box h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
    }

    .modal-box .modal-plan-name {
      color: var(--orange-light);
      font-size: 0.85rem;
      margin-bottom: 1.2rem;
    }

    .modal-row {
      display: flex;
      justify-content: space-between;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border2);
      font-size: 0.83rem;
    }

    .modal-row .mr-label {
      color: var(--text2);
    }

    .modal-row .mr-value {
      font-weight: 700;
    }

    .modal-row .mr-value.green {
      color: #4ade80;
    }

    .modal-row .mr-value.amber {
      color: #fbbf24;
    }

    .modal-btns {
      display: flex;
      gap: 0.7rem;
      margin-top: 1.5rem;
    }

    .modal-btns button {
      flex: 1;
      padding: 0.75rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .btn-cancel {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      color: var(--text2);
    }

    .btn-cancel:hover {
      background: rgba(255,255,255,0.06);
      color: #fff;
    }

    .btn-confirm {
      background: linear-gradient(135deg, #f97316, #ef4444);
      border: none;
      color: #fff;
    }

    .btn-confirm:hover:not(:disabled) {
      transform: scale(1.02);
    }

    .btn-confirm:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 3rem;
      color: var(--text3);
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20,20,20,0.95);
      backdrop-filter: blur(25px);
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 0.5rem 0.7rem;
      display: flex;
      gap: 0.2rem;
      z-index: 200;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .nav-item {
      padding: 0.5rem 0.9rem;
      border-radius: 40px;
      color: var(--text2);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .nav-item i { font-size: 0.95rem; }
    .nav-item.active,
    .nav-item:hover {
      background: linear-gradient(135deg, rgba(249,115,22,0.2), rgba(239,68,68,0.1));
      color: #fff;
    }

    .nav-item span { display: none; }

    @media (min-width: 500px) {
      .nav-item span { display: inline; }
    }

    @media (max-width: 400px) {
      .plan-item { flex-wrap: wrap; }
      .plan-action { width: 100%; text-align: left; display: flex; justify-content: space-between; align-items: center; }
      .modal-btns { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="app-content">
    
    <!-- Header -->
    <div class="page-header">
      <a href="dashboard.html" class="back-link">
        <i class="fas fa-arrow-left"></i>
      </a>
      <div class="page-title">
        <i class="fas fa-layer-group"></i> Investment Plans
      </div>
      <div class="wallet-mini">
        <i class="fas fa-wallet wm-icon"></i>
        <span class="wm-amount" id="headerBalance">₦0</span>
      </div>
    </div>

    <!-- Info Strip -->
    <div class="info-strip">
      <i class="fas fa-info-circle"></i>
      <span>Choose a plan, invest once, and earn daily ROI for 30 days. Your purchased plans will appear in <strong>My Investments</strong>.</span>
    </div>

    <!-- Plans List -->
    <div class="plans-list" id="plansList">
      <div class="loading-state">
        <i class="fas fa-spinner fa-spin"></i> Loading plans...
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="plans.html" class="nav-item active"><i class="fas fa-layer-group"></i><span>Plans</span></a>
    <a href="investment.html" class="nav-item"><i class="fas fa-rocket"></i><span>Invest</span></a>
    <a href="referral.html" class="nav-item"><i class="fas fa-users"></i><span>Referral</span></a>
    <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
  </div>

  <script type="module">
    // 🔥 FIREBASE IMPORTS
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, updateDoc, increment, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // 🔥 FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyAYw02OLQ-AOun_0YLzTd7DaCLsHQqHxGk",
      authDomain: "finexo-3afc7.firebaseapp.com",
      projectId: "finexo-3afc7",
      storageBucket: "finexo-3afc7.firebasestorage.app",
      messagingSenderId: "443358513817",
      appId: "1:443358513817:web:756f9aa5e02dc05ca84608"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const fm = (v) => "₦" + Number(v || 0).toLocaleString();
    let currentUser = null;
    let userData = null;
    let userWallet = 0;

    // 🔥 10 UNIQUE INVESTMENT PLANS
    const PLANS = [
      { id: 1,  name: "Emerald Seed",     icon: "🌱", min: 3000,   daily: 400,   days: 30, popular: false, color: "piw-1" },
      { id: 2,  name: "Sapphire Bloom",   icon: "💎", min: 5000,   daily: 700,   days: 30, popular: false, color: "piw-2" },
      { id: 3,  name: "Ruby Growth",      icon: "🔴", min: 10000,  daily: 1500,  days: 30, popular: false, color: "piw-3" },
      { id: 4,  name: "Diamond Core",     icon: "💠", min: 20000,  daily: 3200,  days: 30, popular: false, color: "piw-4" },
      { id: 5,  name: "Platinum Edge",    icon: "👑", min: 30000,  daily: 5000,  days: 30, popular: true,  color: "piw-5" },
      { id: 6,  name: "Titan Vault",      icon: "🏦", min: 50000,  daily: 8500,  days: 30, popular: false, color: "piw-6" },
      { id: 7,  name: "Phoenix Rise",     icon: "🔥", min: 70000,  daily: 12000, days: 30, popular: false, color: "piw-7" },
      { id: 8,  name: "Oracle Prime",     icon: "🔮", min: 100000, daily: 17500, days: 30, popular: false, color: "piw-8" },
      { id: 9,  name: "Infinity Peak",    icon: "♾️", min: 150000, daily: 27000, days: 30, popular: false, color: "piw-9" },
      { id: 10, name: "Legacy Fortress",  icon: "🏰", min: 200000, daily: 36000, days: 30, popular: false, color: "piw-10" }
    ];

    // 🔥 RENDER PLANS
    function renderPlans() {
      const container = document.getElementById('plansList');

      container.innerHTML = PLANS.map(plan => {
        const totalIncome = plan.daily * plan.days;
        const canAfford = userWallet >= plan.min;
        const popularClass = plan.popular ? 'popular' : '';

        return `
          <div class="plan-item ${popularClass}">
            ${plan.popular ? '<div class="popular-tag">Popular</div>' : ''}
            
            <div class="plan-icon-wrap ${plan.color}">${plan.icon}</div>
            
            <div class="plan-info">
              <div class="pi-name">${plan.name}</div>
              <div class="pi-meta">
                <span><i class="fas fa-coins"></i> ${fm(plan.daily)}/day</span>
                <span><i class="fas fa-calendar"></i> ${plan.days} days</span>
                <span><i class="fas fa-chart-line"></i> Total: ${fm(totalIncome)}</span>
              </div>
            </div>

            <div class="plan-action">
              <div class="pa-price">${fm(plan.min)}</div>
              <div class="pa-roi">+${fm(plan.daily)} daily</div>
              <button class="buy-btn" onclick="openBuyModal(${plan.id})" ${!canAfford ? 'disabled' : ''}>
                ${canAfford ? 'Invest Now' : 'Low Balance'}
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // 🔥 OPEN BUY MODAL
    window.openBuyModal = function(planId) {
      const plan = PLANS.find(p => p.id === planId);
      if (!plan || userWallet < plan.min) return;

      const totalIncome = plan.daily * plan.days;

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.id = 'buyModal';
      overlay.innerHTML = `
        <div class="modal-box">
          <h3>${plan.icon} ${plan.name}</h3>
          <p class="modal-plan-name">Confirm your investment</p>

          <div class="modal-row">
            <span class="mr-label">Investment Amount</span>
            <span class="mr-value">${fm(plan.min)}</span>
          </div>
          <div class="modal-row">
            <span class="mr-label">Daily ROI</span>
            <span class="mr-value green">+${fm(plan.daily)}</span>
          </div>
          <div class="modal-row">
            <span class="mr-label">Duration</span>
            <span class="mr-value">${plan.days} Days</span>
          </div>
          <div class="modal-row">
            <span class="mr-label">Total Income</span>
            <span class="mr-value green">${fm(totalIncome)}</span>
          </div>
          <div class="modal-row">
            <span class="mr-label">Your Balance</span>
            <span class="mr-value">${fm(userWallet)}</span>
          </div>
          <div class="modal-row" style="border:none;">
            <span class="mr-label">Balance After</span>
            <span class="mr-value amber">${fm(userWallet - plan.min)}</span>
          </div>

          <div class="modal-btns">
            <button class="btn-cancel" onclick="closeBuyModal()">Cancel</button>
            <button class="btn-confirm" id="confirmBuyBtn" onclick="confirmPurchase(${plan.id})">
              <i class="fas fa-check-circle"></i> Confirm Purchase
            </button>
          </div>
        </div>
      `;

      document.body.appendChild(overlay);

      // Close on overlay click
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) closeBuyModal();
      });
    };

    // 🔥 CLOSE MODAL
    window.closeBuyModal = function() {
      const modal = document.getElementById('buyModal');
      if (modal) {
        modal.style.opacity = '0';
        modal.style.transition = 'opacity 0.2s';
        setTimeout(() => modal.remove(), 200);
      }
    };

    // 🔥 CONFIRM PURCHASE
    window.confirmPurchase = async function(planId) {
      const plan = PLANS.find(p => p.id === planId);
      if (!plan) return;

      const confirmBtn = document.getElementById('confirmBuyBtn');
      if (!confirmBtn) return;

      // Final balance check
      if (userWallet < plan.min) {
        Swal.fire({
          icon: 'error',
          title: 'Insufficient Balance',
          text: `You need ${fm(plan.min)} but your balance is ${fm(userWallet)}`,
          confirmButtonColor: '#f97316'
        });
        closeBuyModal();
        return;
      }

      confirmBtn.disabled = true;
      confirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

      try {
        const userId = currentUser.uid;
        const totalIncome = plan.daily * plan.days;
        const startDate = new Date();
        const endDate = new Date(startDate.getTime() + (plan.days * 24 * 60 * 60 * 1000));

        // 🔥 Create investment record
        const investRef = doc(collection(db, `users/${userId}/activePlans`));
        await setDoc(investRef, {
          planId: plan.id,
          planName: plan.name,
          planIcon: plan.icon,
          capital: plan.min,
          dailyEarning: plan.daily,
          totalDays: plan.days,
          totalIncome: totalIncome,
          daysLeft: plan.days,
          totalEarned: 0,
          lastPayoutDate: null,
          nextPayoutDate: new Date(startDate.getTime() + (24 * 60 * 60 * 1000)),
          startDate: startDate,
          endDate: endDate,
          status: 'active',
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        // 🔥 Deduct from user wallet
        const userRef = doc(db, 'users', userId);
        await updateDoc(userRef, {
          wallet: increment(-plan.min),
          totalDeposits: increment(plan.min),
          activeInvestments: increment(1),
          updatedAt: serverTimestamp()
        });

        // 🔥 Transaction record for user
        await setDoc(doc(collection(db, `users/${userId}/transactions`)), {
          type: 'investment_purchase',
          amount: plan.min,
          status: 'completed',
          description: `Purchased: ${plan.name} - Daily ROI ${fm(plan.daily)} × ${plan.days} days`,
          planId: plan.id,
          planName: plan.name,
          createdAt: serverTimestamp()
        });

        // 🔥 CREDIT UPLINERS
        const userDoc = await getDoc(userRef);
        const ud = userDoc.data();
        let uplinerCredits = [];

        if (ud.referredBy || ud.level2Referrer || ud.level3Referrer) {
          const batch = writeBatch(db);

          // Level 1 - 20%
          if (ud.referredBy) {
            const l1Commission = Math.floor(plan.min * 0.20);
            const l1Ref = doc(db, 'users', ud.referredBy);
            batch.update(l1Ref, {
              wallet: increment(l1Commission),
              totalRefEarnings: increment(l1Commission),
              totalEarnings: increment(l1Commission),
              updatedAt: serverTimestamp()
            });

            // Update referral record
            const refRecord = doc(db, `users/${ud.referredBy}/referrals`, userId);
            batch.update(refRecord, {
              totalEarned: increment(l1Commission),
              lastInvestment: plan.min,
              lastInvestmentDate: serverTimestamp()
            });

            // Transaction for Level 1 upliner
            const l1TxRef = doc(collection(db, `users/${ud.referredBy}/transactions`));
            batch.set(l1TxRef, {
              type: 'referral_bonus',
              amount: l1Commission,
              status: 'completed',
              description: `Level 1 Referral Bonus (20%) - ${plan.name} purchase by ${ud.fullName || ud.username || 'User'}`,
              fromUserId: userId,
              planName: plan.name,
              createdAt: serverTimestamp()
            });

            uplinerCredits.push(`Level 1: ${fm(l1Commission)} (20%)`);
          }

          // Level 2 - 3%
          if (ud.level2Referrer) {
            const l2Commission = Math.floor(plan.min * 0.03);
            const l2Ref = doc(db, 'users', ud.level2Referrer);
            batch.update(l2Ref, {
              wallet: increment(l2Commission),
              totalRefEarnings: increment(l2Commission),
              totalEarnings: increment(l2Commission),
              updatedAt: serverTimestamp()
            });

            const l2TxRef = doc(collection(db, `users/${ud.level2Referrer}/transactions`));
            batch.set(l2TxRef, {
              type: 'referral_bonus',
              amount: l2Commission,
              status: 'completed',
              description: `Level 2 Referral Bonus (3%) - ${plan.name} purchase by ${ud.fullName || ud.username || 'User'}`,
              fromUserId: userId,
              planName: plan.name,
              createdAt: serverTimestamp()
            });

            uplinerCredits.push(`Level 2: ${fm(l2Commission)} (3%)`);
          }

          // Level 3 - 1%
          if (ud.level3Referrer) {
            const l3Commission = Math.floor(plan.min * 0.01);
            const l3Ref = doc(db, 'users', ud.level3Referrer);
            batch.update(l3Ref, {
              wallet: increment(l3Commission),
              totalRefEarnings: increment(l3Commission),
              totalEarnings: increment(l3Commission),
              updatedAt: serverTimestamp()
            });

            const l3TxRef = doc(collection(db, `users/${ud.level3Referrer}/transactions`));
            batch.set(l3TxRef, {
              type: 'referral_bonus',
              amount: l3Commission,
              status: 'completed',
              description: `Level 3 Referral Bonus (1%) - ${plan.name} purchase by ${ud.fullName || ud.username || 'User'}`,
              fromUserId: userId,
              planName: plan.name,
              createdAt: serverTimestamp()
            });

            uplinerCredits.push(`Level 3: ${fm(l3Commission)} (1%)`);
          }

          await batch.commit();
          console.log('✅ Upliners credited:', uplinerCredits);
        }

        // Update local wallet
        userWallet -= plan.min;
        document.getElementById('headerBalance').textContent = fm(userWallet);

        // Close modal
        closeBuyModal();

        // 🔥 SUCCESS POPUP with redirect
        const uplinerMsg = uplinerCredits.length > 0 
          ? `<div style="margin-top:0.8rem;padding:0.6rem;background:rgba(249,115,22,0.08);border-radius:10px;font-size:0.75rem;text-align:left;">
              <strong style="color:#fb923c;">🎁 Upliner Credits:</strong><br>
              ${uplinerCredits.join('<br>')}
            </div>`
          : '';

        Swal.fire({
          icon: 'success',
          title: '🎉 Investment Successful!',
          html: `
            <div style="text-align:left;padding:0.3rem 0;">
              <p><strong>${plan.icon} ${plan.name}</strong></p>
              <p>Amount: <strong>${fm(plan.min)}</strong></p>
              <p>Daily ROI: <strong style="color:#4ade80;">${fm(plan.daily)}</strong></p>
              <p>Duration: <strong>${plan.days} Days</strong></p>
              <p>Total Income: <strong style="color:#4ade80;">${fm(totalIncome)}</strong></p>
              <p style="color:#a0a0a0;font-size:0.75rem;margin-top:0.5rem;"><i class="fas fa-clock"></i> First ROI after 24 hours</p>
              ${uplinerMsg}
            </div>
          `,
          confirmButtonText: '📊 View My Investments',
          confirmButtonColor: '#f97316',
          allowOutsideClick: false,
          showCancelButton: true,
          cancelButtonText: 'Stay Here',
          cancelButtonColor: '#6b7280'
        }).then((result) => {
          if (result.isConfirmed) {
            window.location.href = 'investment.html';
          } else {
            // Refresh plans to update button states
            renderPlans();
          }
        });

      } catch (error) {
        console.error('❌ Purchase error:', error);
        Swal.fire({
          icon: 'error',
          title: 'Purchase Failed',
          text: error.message || 'Something went wrong. Please try again.',
          confirmButtonColor: '#f97316'
        });
      }
    };

    // 🔥 AUTH STATE
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;

      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (!userDoc.exists()) { window.location.href = 'login.html'; return; }

        userData = userDoc.data();
        userWallet = userData.wallet || 0;
        document.getElementById('headerBalance').textContent = fm(userWallet);

        // Render plans
        renderPlans();

      } catch(e) {
        console.error('Auth error:', e);
        document.getElementById('plansList').innerHTML = `
          <div class="loading-state">⚠️ Error loading plans. Please refresh.</div>`;
      }
    });

    console.log('✅ Finoxa Plans Page Ready');
    console.log('📊 10 Unique Plans | ₦3k-₦200k | 30 Days ROI');
    console.log('💰 Referral Credits: L1=20% | L2=3% | L3=1%');
    console.log('📌 ROI paid on investment.html page');
  </script>
</body>
</html>
