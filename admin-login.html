<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finoxa • Admin Portal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --orange: #f97316;
      --orange-light: #fb923c;
      --red: #ef4444;
      --amber: #f59e0b;
      --green: #22c55e;
      --text: #ffffff;
      --text2: #a0a0a0;
      --text3: #666666;
      --border: rgba(255,255,255,0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Background effects */
    .bg-aura {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-aura::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(239,68,68,0.08) 0%, transparent 70%);
      top: -150px; right: -100px;
      animation: auraMove 15s infinite alternate;
    }

    .bg-aura::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(249,115,22,0.06) 0%, transparent 70%);
      bottom: -100px; left: -80px;
      animation: auraMove 18s infinite alternate-reverse;
    }

    @keyframes auraMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -25px) scale(1.1); }
    }

    /* Grid */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(239,68,68,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(239,68,68,0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    /* Floating particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .particle-1 { width: 6px; height: 6px; background: #f87171; top: 20%; left: 15%; animation: particleFloat 10s infinite; }
    .particle-2 { width: 4px; height: 4px; background: #fb923c; top: 60%; right: 20%; animation: particleFloat 12s infinite 3s; }
    .particle-3 { width: 5px; height: 5px; background: #ef4444; bottom: 25%; left: 30%; animation: particleFloat 8s infinite 5s; }

    @keyframes particleFloat {
      0%, 100% { transform: translate(0, 0); opacity: 0.3; }
      50% { transform: translate(30px, -40px); opacity: 0.8; }
    }

    /* Main wrapper */
    .admin-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    /* Brand */
    .brand-area {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, rgba(239,68,68,0.2), rgba(249,115,22,0.15));
      border: 2px solid rgba(239,68,68,0.3);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 0.8rem;
      backdrop-filter: blur(15px);
    }

    .brand-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #f87171 0%, #fb923c 50%, #fbbf24 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-sub {
      color: rgba(255,255,255,0.35);
      font-size: 0.8rem;
      margin-top: 0.3rem;
      letter-spacing: 0.05em;
    }

    /* Admin badge */
    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 50px;
      padding: 0.4rem 1rem;
      margin-top: 0.6rem;
      font-size: 0.7rem;
      color: #f87171;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Login Card */
    .login-card {
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(239,68,68,0.15);
      border-radius: 20px;
      padding: 2.2rem 1.8rem;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 80px rgba(239,68,68,0.03);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #ef4444, #f97316, #fbbf24);
    }

    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .card-header .shield-icon {
      width: 50px; height: 50px;
      background: rgba(239,68,68,0.1);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: #f87171;
      margin-bottom: 0.7rem;
      border: 1px solid rgba(239,68,68,0.2);
    }

    .card-header h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
    }

    .card-header p {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
    }

    /* Form */
    .form-stack {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .field-block {
      position: relative;
    }

    .field-block label {
      display: block;
      color: rgba(255,255,255,0.5);
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-group {
      position: relative;
    }

    .input-group .pre-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(239,68,68,0.4);
      font-size: 0.85rem;
      z-index: 2;
      pointer-events: none;
      transition: color 0.3s;
    }

    .input-group input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(239,68,68,0.12);
      border-radius: 12px;
      color: #fff;
      font-size: 0.9rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all 0.3s;
      outline: none;
    }

    .input-group input:focus {
      border-color: #f87171;
      background: rgba(239,68,68,0.05);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.08);
    }

    .input-group input:focus ~ .pre-icon {
      color: #f87171;
    }

    .input-group input::placeholder {
      color: rgba(255,255,255,0.15);
    }

    .input-group input.input-error {
      border-color: #ef4444;
      background: rgba(239,68,68,0.04);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.2rem;
      z-index: 2;
      transition: color 0.3s;
    }

    .pw-toggle:hover { color: #f87171; }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 8px 25px rgba(239,68,68,0.3);
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(239,68,68,0.45);
      background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Back link */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.2rem;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      font-size: 0.78rem;
      transition: color 0.3s;
    }

    .back-link:hover { color: #f87171; }
    .back-link i { margin-right: 0.3rem; }

    /* Toast notification */
    .admin-toast {
      position: fixed;
      bottom: 25px;
      right: 25px;
      z-index: 10000;
      background: rgba(18,18,18,0.95);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 1rem 1.3rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      animation: toastSlideUp 0.4s cubic-bezier(0.16,1,0.3,1);
      min-width: 300px;
      max-width: 420px;
    }

    .admin-toast.success { border-bottom: 3px solid #22c55e; }
    .admin-toast.error { border-bottom: 3px solid #ef4444; }
    .admin-toast.warning { border-bottom: 3px solid #f59e0b; }

    @keyframes toastSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .toast-icon-box {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0;
    }

    .toast-icon-box.success { background: rgba(34,197,94,0.12); color: #4ade80; }
    .toast-icon-box.error { background: rgba(239,68,68,0.12); color: #f87171; }
    .toast-icon-box.warning { background: rgba(245,158,11,0.12); color: #fbbf24; }

    .toast-text h4 { font-size: 0.82rem; font-weight: 700; color: #fff; margin-bottom: 0.1rem; }
    .toast-text p { font-size: 0.72rem; color: rgba(255,255,255,0.5); }

    /* Responsive */
    @media (max-width: 500px) {
      .login-card { padding: 1.8rem 1.3rem; border-radius: 16px; }
      .brand-name { font-size: 1.5rem; }
      .admin-toast { left: 1rem; right: 1rem; min-width: auto; }
    }
  </style>
</head>
<body>

  <!-- Background effects -->
  <div class="bg-aura"></div>
  <div class="particle particle-1"></div>
  <div class="particle particle-2"></div>
  <div class="particle particle-3"></div>

  <!-- Admin Login Wrapper -->
  <div class="admin-wrapper">
    
    <!-- Brand -->
    <div class="brand-area">
      <div class="brand-icon">🛡️</div>
      <h1 class="brand-name">Finoxa Admin</h1>
      <p class="brand-sub">Secure Administrator Portal</p>
      <div class="admin-badge">
        <i class="fas fa-lock"></i> Restricted Access
      </div>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="card-header">
        <div class="shield-icon">
          <i class="fas fa-shield-halved"></i>
        </div>
        <h2>Admin Sign In</h2>
        <p>Enter your credentials to continue</p>
      </div>

      <form id="adminLoginForm" class="form-stack">
        <!-- Email -->
        <div class="field-block">
          <label>Admin Email</label>
          <div class="input-group">
            <i class="fas fa-envelope pre-icon"></i>
            <input type="email" id="adminEmail" placeholder="admin@finoxa.com" required autocomplete="email">
          </div>
        </div>

        <!-- Password -->
        <div class="field-block">
          <label>Password</label>
          <div class="input-group">
            <i class="fas fa-lock pre-icon"></i>
            <input type="password" id="adminPassword" placeholder="Enter admin password" required autocomplete="current-password">
            <button type="button" class="pw-toggle" id="pwToggleBtn">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Access Admin Panel
        </button>
      </form>

      <!-- Back to main site -->
      <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Main Site
      </a>
    </div>
  </div>

  <script type="module">
    // 🔥 FIREBASE IMPORTS
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // 🔥 FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyAYw02OLQ-AOun_0YLzTd7DaCLsHQqHxGk",
      authDomain: "finexo-3afc7.firebaseapp.com",
      projectId: "finexo-3afc7",
      storageBucket: "finexo-3afc7.firebasestorage.app",
      messagingSenderId: "443358513817",
      appId: "1:443358513817:web:756f9aa5e02dc05ca84608"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 🔥 PASSWORD TOGGLE
    const pwToggleBtn = document.getElementById('pwToggleBtn');
    const passwordInput = document.getElementById('adminPassword');
    let pwVisible = false;

    pwToggleBtn.addEventListener('click', () => {
      pwVisible = !pwVisible;
      const icon = pwToggleBtn.querySelector('i');
      if (pwVisible) {
        passwordInput.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // 🔥 TOAST NOTIFICATION
    function showToast(title, message, type = 'error') {
      const existing = document.querySelector('.admin-toast');
      if (existing) existing.remove();

      const icons = {
        success: 'fa-check-circle',
        error: 'fa-exclamation-circle',
        warning: 'fa-exclamation-triangle'
      };

      const toast = document.createElement('div');
      toast.className = `admin-toast ${type}`;
      toast.innerHTML = `
        <div class="toast-icon-box ${type}">
          <i class="fas ${icons[type]}"></i>
        </div>
        <div class="toast-text">
          <h4>${title}</h4>
          <p>${message}</p>
        </div>
      `;
      document.body.appendChild(toast);

      setTimeout(() => {
        if (toast.parentNode) {
          toast.style.opacity = '0';
          toast.style.transform = 'translateY(20px)';
          toast.style.transition = 'all 0.3s';
          setTimeout(() => toast.remove(), 300);
        }
      }, 5000);
    }

    // 🔥 CHECK IF ALREADY LOGGED IN AS ADMIN
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const userDoc = await getDoc(doc(db, 'users', user.uid));
          if (userDoc.exists() && userDoc.data().isAdmin === true) {
            // Already logged in as admin, redirect to dashboard
            window.location.href = 'admin/index.html';
          }
        } catch(e) {
          console.warn('Auth check:', e);
        }
      }
    });

    // 🔥 ADMIN LOGIN
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const loginBtn = document.getElementById('loginBtn');
      const emailInput = document.getElementById('adminEmail');
      const passwordInputEl = document.getElementById('adminPassword');

      const email = emailInput.value.trim();
      const password = passwordInputEl.value;

      // Reset errors
      emailInput.classList.remove('input-error');
      passwordInputEl.classList.remove('input-error');

      // Validation
      if (!email) {
        emailInput.classList.add('input-error');
        return showToast('Email Required', 'Please enter admin email address', 'warning');
      }

      if (!password) {
        passwordInputEl.classList.add('input-error');
        return showToast('Password Required', 'Please enter your password', 'warning');
      }

      if (password.length < 8) {
        passwordInputEl.classList.add('input-error');
        return showToast('Invalid Password', 'Password must be at least 8 characters', 'error');
      }

      // Disable button
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

      try {
        // Sign in
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 🔥 CHECK IF USER IS ADMIN
        const userDoc = await getDoc(doc(db, 'users', user.uid));

        if (!userDoc.exists()) {
          await auth.signOut();
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Admin Panel';
          return showToast('Access Denied', 'User account not found in database', 'error');
        }

        const userData = userDoc.data();

        if (userData.isAdmin !== true) {
          // Not an admin - sign out immediately
          await auth.signOut();
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Admin Panel';
          return showToast('Access Denied', 'You do not have administrator privileges', 'error');
        }

        // ✅ ADMIN VERIFIED - Update last login
        try {
          await updateDoc(doc(db, 'users', user.uid), {
            lastLogin: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
        } catch (_) {}

        console.log('✅ Admin login successful:', userData.fullName || user.email);

        // Success toast
        showToast('✅ Access Granted', `Welcome back, ${userData.fullName || 'Admin'}! Redirecting...`, 'success');

        // Redirect to admin dashboard
        setTimeout(() => {
          window.location.href = 'admin/index.html';
        }, 1500);

      } catch (error) {
        console.error('❌ Admin login error:', error);

        let errorTitle = 'Login Failed';
        let errorMessage = 'Please check your credentials.';

        switch (error.code) {
          case 'auth/invalid-email':
            errorMessage = 'Invalid email format.';
            emailInput.classList.add('input-error');
            break;
          case 'auth/user-not-found':
            errorMessage = 'No account found with this email.';
            emailInput.classList.add('input-error');
            break;
          case 'auth/wrong-password':
            errorMessage = 'Incorrect password.';
            passwordInputEl.classList.add('input-error');
            break;
          case 'auth/invalid-credential':
            errorMessage = 'Invalid email or password.';
            emailInput.classList.add('input-error');
            passwordInputEl.classList.add('input-error');
            break;
          case 'auth/too-many-requests':
            errorTitle = 'Too Many Attempts';
            errorMessage = 'Account temporarily locked. Try again later.';
            break;
          case 'auth/network-request-failed':
            errorMessage = 'Network error. Check your connection.';
            break;
          default:
            errorMessage = error.message || 'Login failed.';
        }

        showToast(errorTitle, errorMessage, 'error');

        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Admin Panel';
      }
    });

    // 🔥 CLEAR ERRORS ON INPUT
    document.getElementById('adminEmail').addEventListener('input', function() {
      this.classList.remove('input-error');
    });

    document.getElementById('adminPassword').addEventListener('input', function() {
      this.classList.remove('input-error');
    });

    // 🔥 ENTER KEY SUPPORT
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const active = document.activeElement;
        if (active && (active.id === 'adminEmail' || active.id === 'adminPassword')) {
          e.preventDefault();
          document.getElementById('adminLoginForm').dispatchEvent(new Event('submit'));
        }
      }
    });

    console.log('🛡️ Finoxa Admin Login Ready');
    console.log('📍 Make sure isAdmin: true is set on admin user document');
  </script>
</body>
</html>
