<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finoxa • Create Account & Earn ₦500 Bonus</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #1a1a1a;
      background-image: 
        radial-gradient(ellipse at 0% 0%, rgba(249, 115, 22, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(239, 68, 68, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(245, 158, 11, 0.04) 0%, transparent 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
    }

    /* Grid lines background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(249, 115, 22, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249, 115, 22, 0.03) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }

    /* Main wrapper */
    .main-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
    }

    /* Logo section - top centered */
    .logo-section {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-circle {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.15) 0%, rgba(239, 68, 68, 0.1) 100%);
      border: 2px solid rgba(249, 115, 22, 0.25);
      border-radius: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin-bottom: 1rem;
      transform: rotate(3deg);
      backdrop-filter: blur(10px);
    }

    .site-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fb923c 0%, #f87171 50%, #fbbf24 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.9rem;
      margin-top: 0.4rem;
      font-weight: 400;
    }

    /* Bonus card - floating */
    .bonus-float-card {
      background: rgba(30, 30, 30, 0.9);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(249, 115, 22, 0.2);
      border-radius: 16px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .bonus-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .bonus-emoji {
      font-size: 2rem;
    }

    .bonus-info h3 {
      color: #fb923c;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.2rem;
    }

    .bonus-info .amount {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffffff;
    }

    .bonus-right {
      width: 50px;
      height: 50px;
      background: rgba(249, 115, 22, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fb923c;
      font-size: 1.3rem;
    }

    /* Registration card */
    .register-card {
      background: rgba(24, 24, 24, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .card-head {
      margin-bottom: 2rem;
    }

    .card-head h2 {
      font-family: 'Space Grotesk', sans-serif;
      color: #ffffff;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .card-head p {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.85rem;
    }

    /* Progress steps - horizontal */
    .steps-row {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 2rem;
      padding: 0 0.5rem;
    }

    .step-item {
      display: flex;
      align-items: center;
      gap: 0;
      flex: 1;
    }

    .step-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.3);
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.03);
      transition: all 0.3s;
    }

    .step-circle.active {
      border-color: #fb923c;
      color: #fb923c;
      background: rgba(249, 115, 22, 0.1);
    }

    .step-line {
      flex: 1;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      margin: 0 0.5rem;
      border-radius: 10px;
    }

    .step-line.active {
      background: linear-gradient(90deg, #fb923c, #f87171);
    }

    /* Form styling */
    .form-stack {
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
    }

    .field-block {
      position: relative;
    }

    .field-block label {
      display: block;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field-block label .optional {
      color: rgba(255, 255, 255, 0.25);
      font-weight: 400;
      margin-left: 0.3rem;
      text-transform: none;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .pre-icon {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(249, 115, 22, 0.5);
      font-size: 0.9rem;
      z-index: 2;
      pointer-events: none;
    }

    .input-wrap input {
      width: 100%;
      padding: 0.95rem 1.2rem 0.95rem 3rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #ffffff;
      font-size: 0.9rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all 0.3s;
      outline: none;
    }

    .input-wrap input:focus {
      border-color: #fb923c;
      background: rgba(249, 115, 22, 0.05);
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.08);
    }

    .input-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .input-wrap input.input-error {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.05);
    }

    .input-wrap input.input-valid {
      border-color: #f59e0b;
      background: rgba(245, 158, 11, 0.05);
    }

    /* Password toggle button */
    .toggle-password {
      position: absolute;
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.3rem;
      transition: color 0.3s;
      z-index: 2;
    }

    .toggle-password:hover {
      color: #fb923c;
    }

    /* Feedback messages */
    .inline-feedback {
      font-size: 0.75rem;
      margin-top: 0.4rem;
      display: none;
      align-items: center;
      gap: 0.35rem;
      font-weight: 500;
      padding: 0.3rem 0;
    }

    .inline-feedback.show {
      display: flex;
    }

    .inline-feedback.error {
      color: #ef4444;
    }

    .inline-feedback.success {
      color: #f59e0b;
    }

    .inline-feedback.checking {
      color: #fb923c;
    }

    /* Verified badge inline */
    .verified-tag {
      position: absolute;
      right: 3.5rem;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: rgba(245, 158, 11, 0.15);
      border-radius: 20px;
      color: #fbbf24;
      font-size: 10px;
      font-weight: 700;
      z-index: 2;
    }

    /* Password strength bar */
    .strength-track {
      margin-top: 0.5rem;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: all 0.4s ease;
      border-radius: 10px;
    }

    .strength-fill.weak {
      width: 25%;
      background: #ef4444;
    }

    .strength-fill.fair {
      width: 50%;
      background: #f59e0b;
    }

    .strength-fill.good {
      width: 75%;
      background: #fb923c;
    }

    .strength-fill.strong {
      width: 100%;
      background: #22c55e;
    }

    .pw-hint-text {
      font-size: 0.74rem;
      color: rgba(255, 255, 255, 0.35);
      margin-top: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* Terms section */
    .terms-block {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 1rem 1.2rem;
      margin: 0.5rem 0;
    }

    .terms-label {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.83rem;
      cursor: pointer;
      line-height: 1.5;
    }

    .terms-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #fb923c;
      border-radius: 4px;
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .terms-label a {
      color: #fb923c;
      text-decoration: none;
      font-weight: 600;
    }

    .terms-label a:hover {
      text-decoration: underline;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #f97316 0%, #ef4444 100%);
      border: none;
      border-radius: 14px;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      box-shadow: 0 10px 30px rgba(249, 115, 22, 0.3);
      letter-spacing: 0.5px;
      margin-top: 0.5rem;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(249, 115, 22, 0.45);
      background: linear-gradient(135deg, #fb923c 0%, #f87171 100%);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Login redirect */
    .redirect-text {
      text-align: center;
      margin-top: 1.8rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.85rem;
    }

    .redirect-text a {
      color: #fb923c;
      text-decoration: none;
      font-weight: 700;
      margin-left: 0.3rem;
      transition: color 0.3s;
    }

    .redirect-text a:hover {
      color: #f97316;
    }

    /* Toast notification */
    .floating-toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 10000;
      background: rgba(20, 20, 20, 0.98);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 1rem 1.5rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      min-width: 320px;
      max-width: 450px;
    }

    .floating-toast.success {
      border-bottom: 3px solid #f59e0b;
    }

    .floating-toast.error {
      border-bottom: 3px solid #ef4444;
    }

    .floating-toast.warning {
      border-bottom: 3px solid #fb923c;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .toast-icon-wrap {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .toast-icon-wrap.success {
      background: rgba(245, 158, 11, 0.12);
      color: #fbbf24;
    }

    .toast-icon-wrap.error {
      background: rgba(239, 68, 68, 0.12);
      color: #f87171;
    }

    .toast-icon-wrap.warning {
      background: rgba(249, 115, 22, 0.12);
      color: #fb923c;
    }

    .toast-body h4 {
      font-size: 0.9rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.15rem;
    }

    .toast-body p {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.4;
    }

    /* Responsive */
    @media (max-width: 500px) {
      .register-card {
        padding: 2rem 1.5rem;
        border-radius: 16px;
      }

      .bonus-float-card {
        padding: 1rem;
      }

      .bonus-info .amount {
        font-size: 1.5rem;
      }

      .site-name {
        font-size: 2rem;
      }

      .floating-toast {
        left: 1rem;
        right: 1rem;
        min-width: auto;
      }
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <!-- Logo & Brand -->
    <div class="logo-section">
      <div class="logo-circle">🔶</div>
      <h1 class="site-name">Finoxa</h1>
      <p class="tagline">Smart wealth. Smart future.</p>
    </div>

    <!-- Bonus Card -->
    <div class="bonus-float-card">
      <div class="bonus-left">
        <span class="bonus-emoji">🎁</span>
        <div class="bonus-info">
          <h3>Welcome Bonus</h3>
          <div class="amount">₦500</div>
        </div>
      </div>
      <div class="bonus-right">
        <i class="fas fa-gift"></i>
      </div>
    </div>

    <!-- Registration Form Card -->
    <div class="register-card">
      <div class="card-head">
        <h2>Create Account</h2>
        <p>Join thousands building wealth with Finoxa</p>
      </div>

      <!-- Steps -->
      <div class="steps-row">
        <div class="step-item">
          <div class="step-circle active">1</div>
          <div class="step-line active"></div>
        </div>
        <div class="step-item">
          <div class="step-circle">2</div>
          <div class="step-line"></div>
        </div>
        <div class="step-item">
          <div class="step-circle">3</div>
        </div>
      </div>

      <form id="registerForm" class="form-stack">
        <!-- Full Name -->
        <div class="field-block">
          <label>Full Name</label>
          <div class="input-wrap">
            <i class="fas fa-user-circle pre-icon"></i>
            <input type="text" id="name" placeholder="Your full name" required minlength="2">
          </div>
        </div>

        <!-- Username -->
        <div class="field-block">
          <label>Username <span class="optional">(referral ID)</span></label>
          <div class="input-wrap">
            <i class="fas fa-at pre-icon"></i>
            <input type="text" id="username" placeholder="Choose username" required minlength="3" maxlength="20" pattern="[a-z0-9]+">
          </div>
          <div class="inline-feedback" id="usernameFeedback"></div>
        </div>

        <!-- Email -->
        <div class="field-block">
          <label>Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope pre-icon"></i>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>
        </div>

        <!-- Phone -->
        <div class="field-block">
          <label>Phone <span class="optional">(optional)</span></label>
          <div class="input-wrap">
            <i class="fas fa-mobile-alt pre-icon"></i>
            <input type="tel" id="phone" placeholder="08012345678">
          </div>
        </div>

        <!-- Password -->
        <div class="field-block">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fas fa-key pre-icon"></i>
            <input type="password" id="password" placeholder="Create strong password" required minlength="8">
            <button type="button" class="toggle-password" data-target="password">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="strength-track">
            <div class="strength-fill" id="strengthBar"></div>
          </div>
          <div class="pw-hint-text" id="passwordHint">
            <i class="fas fa-info-circle"></i> Minimum 8 characters
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="field-block">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <i class="fas fa-shield-alt pre-icon"></i>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            <button type="button" class="toggle-password" data-target="confirmPassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Referral Code -->
        <div class="field-block">
          <label>Referral Code <span class="optional">(optional)</span></label>
          <div class="input-wrap" style="position:relative;">
            <i class="fas fa-user-plus pre-icon"></i>
            <input type="text" id="referral" placeholder="Enter referral username">
            <span class="verified-tag" id="refVerified" style="display:none;">
              <i class="fas fa-check-circle"></i> Valid
            </span>
          </div>
          <div class="inline-feedback" id="referralFeedback"></div>
        </div>

        <!-- Terms -->
        <div class="terms-block">
          <label class="terms-label">
            <input type="checkbox" id="terms" required>
            <span>I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></span>
          </label>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" id="submitBtn">
          <i class="fas fa-user-check"></i> Create Free Account
        </button>
      </form>

      <!-- Login link -->
      <div class="redirect-text">
        Already registered? <a href="login.html">Sign in to Finoxa</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, where, serverTimestamp, increment, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // 🔥 FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyAYw02OLQ-AOun_0YLzTd7DaCLsHQqHxGk",
      authDomain: "finexo-3afc7.firebaseapp.com",
      projectId: "finexo-3afc7",
      storageBucket: "finexo-3afc7.firebasestorage.app",
      messagingSenderId: "443358513817",
      appId: "1:443358513817:web:756f9aa5e02dc05ca84608"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // 🔥 UPDATED VALUES
    const WELCOME_BONUS = 500;
    const REFERRAL_RATES = { 1: 20, 2: 3, 3: 1 }; // 20%, 3%, 1%

    // Pre-fill referral from URL
    const urlParams = new URLSearchParams(window.location.search);
    const refParam = urlParams.get('ref');
    if (refParam) {
      document.getElementById('referral').value = refParam;
      verifyReferralCode(refParam);
    }

    // 🔥 PASSWORD TOGGLE FUNCTIONALITY
    document.querySelectorAll('.toggle-password').forEach(button => {
      button.addEventListener('click', function() {
        const targetId = this.getAttribute('data-target');
        const input = document.getElementById(targetId);
        const icon = this.querySelector('i');
        
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.remove('fa-eye');
          icon.classList.add('fa-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.remove('fa-eye-slash');
          icon.classList.add('fa-eye');
        }
      });
    });

    function showToast(title, message, type = 'success') {
      const existing = document.querySelector('.floating-toast');
      if (existing) existing.remove();
      
      const icons = {
        success: 'fa-check-circle',
        error: 'fa-exclamation-circle',
        warning: 'fa-exclamation-triangle'
      };
      
      const toast = document.createElement('div');
      toast.className = `floating-toast ${type}`;
      toast.innerHTML = `
        <div class="toast-icon-wrap ${type}">
          <i class="fas ${icons[type]}"></i>
        </div>
        <div class="toast-body">
          <h4>${title}</h4>
          <p>${message}</p>
        </div>
      `;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        if (toast.parentNode) {
          toast.style.opacity = '0';
          toast.style.transform = 'translateY(20px)';
          toast.style.transition = 'all 0.3s';
          setTimeout(() => toast.remove(), 300);
        }
      }, 5000);
    }

    async function findUserByUsername(username) {
      const q = query(collection(db, 'users'), where('username', '==', username.toLowerCase()));
      const snap = await getDocs(q);
      return snap.empty ? null : { id: snap.docs[0].id, ...snap.docs[0].data() };
    }

    let verifiedReferrerId = null;
    let checkTimeout;

    // Username live check
    document.getElementById('username').addEventListener('input', (e) => {
      const val = e.target.value.toLowerCase().trim();
      const fb = document.getElementById('usernameFeedback');
      clearTimeout(checkTimeout);
      
      if (val.length < 3) {
        fb.className = 'inline-feedback';
        e.target.classList.remove('input-valid', 'input-error');
        return;
      }
      
      if (!/^[a-z0-9]+$/.test(val)) {
        fb.innerHTML = '<i class="fas fa-times-circle"></i> Only letters & numbers';
        fb.className = 'inline-feedback show error';
        e.target.classList.add('input-error');
        e.target.classList.remove('input-valid');
        return;
      }
      
      fb.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';
      fb.className = 'inline-feedback show checking';
      
      checkTimeout = setTimeout(async () => {
        try {
          const exists = await findUserByUsername(val);
          if (exists) {
            fb.innerHTML = '<i class="fas fa-times-circle"></i> Taken';
            fb.className = 'inline-feedback show error';
            e.target.classList.add('input-error');
            e.target.classList.remove('input-valid');
          } else {
            fb.innerHTML = '<i class="fas fa-check-circle"></i> Available';
            fb.className = 'inline-feedback show success';
            e.target.classList.add('input-valid');
            e.target.classList.remove('input-error');
          }
        } catch (_) {
          fb.className = 'inline-feedback';
        }
      }, 600);
    });

    // Referral code live check
    document.getElementById('referral').addEventListener('input', (e) => {
      const code = e.target.value.toLowerCase().trim();
      const fb = document.getElementById('referralFeedback');
      const badge = document.getElementById('refVerified');
      badge.style.display = 'none';
      verifiedReferrerId = null;
      clearTimeout(checkTimeout);
      
      if (!code || code.length < 3) {
        fb.className = 'inline-feedback';
        e.target.classList.remove('input-valid', 'input-error');
        return;
      }
      
      fb.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
      fb.className = 'inline-feedback show checking';
      
      checkTimeout = setTimeout(async () => {
        try {
          const ref = await findUserByUsername(code);
          if (ref) {
            verifiedReferrerId = ref.id;
            fb.innerHTML = `<i class="fas fa-check-circle"></i> Referred by ${ref.fullName || ref.username}`;
            fb.className = 'inline-feedback show success';
            e.target.classList.add('input-valid');
            e.target.classList.remove('input-error');
            badge.style.display = 'inline-flex';
          } else {
            fb.innerHTML = '<i class="fas fa-times-circle"></i> Invalid code';
            fb.className = 'inline-feedback show error';
            e.target.classList.add('input-error');
            e.target.classList.remove('input-valid');
          }
        } catch (_) {
          fb.className = 'inline-feedback';
        }
      }, 600);
    });

    async function verifyReferralCode(code) {
      const ref = await findUserByUsername(code);
      if (ref) {
        verifiedReferrerId = ref.id;
        const fb = document.getElementById('referralFeedback');
        fb.innerHTML = `<i class="fas fa-check-circle"></i> Referred by ${ref.fullName || ref.username}`;
        fb.className = 'inline-feedback show success';
        document.getElementById('referral').classList.add('input-valid');
        document.getElementById('refVerified').style.display = 'inline-flex';
      }
    }

    // Password strength
    document.getElementById('password').addEventListener('input', (e) => {
      const pw = e.target.value;
      const bar = document.getElementById('strengthBar');
      const hint = document.getElementById('passwordHint');
      
      let score = 0;
      if (pw.length >= 8) score++;
      if (pw.match(/[a-z]/) && pw.match(/[A-Z]/)) score++;
      if (pw.match(/[0-9]/)) score++;
      if (pw.match(/[^a-zA-Z0-9]/)) score++;
      
      bar.className = 'strength-fill';
      
      if (score <= 1) {
        bar.classList.add('weak');
        hint.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Weak password';
      } else if (score === 2) {
        bar.classList.add('fair');
        hint.innerHTML = '<i class="fas fa-chart-line"></i> Fair password';
      } else if (score === 3) {
        bar.classList.add('good');
        hint.innerHTML = '<i class="fas fa-check-circle"></i> Good password';
      } else {
        bar.classList.add('strong');
        hint.innerHTML = '<i class="fas fa-shield-alt"></i> Strong password!';
      }
    });

    // Password match
    document.getElementById('confirmPassword').addEventListener('input', (e) => {
      const match = document.getElementById('password').value === e.target.value;
      e.target.classList.toggle('input-error', !match && e.target.value.length > 0);
      e.target.classList.toggle('input-valid', match && e.target.value.length > 0);
    });

    // 🔥 FORM SUBMIT - SAME DATA STRUCTURE
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      const name = document.getElementById('name').value.trim();
      const username = document.getElementById('username').value.trim().toLowerCase();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const referralCode = document.getElementById('referral').value.trim().toLowerCase();
      const termsChecked = document.getElementById('terms').checked;

      // Validation
      if (username.length < 3) return showToast('Invalid Username', 'Must be at least 3 characters', 'error');
      if (!/^[a-z0-9]+$/.test(username)) return showToast('Invalid Username', 'Only letters & numbers', 'error');
      if (password.length < 8) return showToast('Weak Password', 'Minimum 8 characters required', 'error');
      if (password !== confirmPassword) return showToast('Mismatch', 'Passwords do not match', 'error');
      if (!termsChecked) return showToast('Terms Required', 'Accept terms to continue', 'warning');

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';

      try {
        // Check username availability
        const usernameExists = await findUserByUsername(username);
        if (usernameExists) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="fas fa-user-check"></i> Create Free Account';
          return showToast('Username Taken', 'Choose another username', 'error');
        }

        // Build referral chain
        let finalReferrer = verifiedReferrerId;
        if (!finalReferrer && referralCode) {
          const refData = await findUserByUsername(referralCode);
          if (refData) finalReferrer = refData.id;
        }

        let level1Referrer = null, level2Referrer = null, level3Referrer = null;
        if (finalReferrer) {
          level1Referrer = finalReferrer;
          const l1Doc = await getDoc(doc(db, 'users', finalReferrer));
          if (l1Doc.exists()) {
            const l1Data = l1Doc.data();
            if (l1Data.referredBy) {
              level2Referrer = l1Data.referredBy;
              const l2Doc = await getDoc(doc(db, 'users', l1Data.referredBy));
              if (l2Doc.exists() && l2Doc.data().referredBy) {
                level3Referrer = l2Doc.data().referredBy;
              }
            }
          }
        }

        // Create auth user
        const credential = await createUserWithEmailAndPassword(auth, email, password);
        const newUserId = credential.user.uid;
        await updateProfile(credential.user, { displayName: name });

        // 🔥 SAME USER DOCUMENT STRUCTURE
        await setDoc(doc(db, 'users', newUserId), {
          uid: newUserId,
          fullName: name,
          username: username,
          email: email,
          phone: phone || '',
          role: 'user',
          status: 'active',
          referredBy: level1Referrer,
          level2Referrer: level2Referrer,
          level3Referrer: level3Referrer,
          wallet: WELCOME_BONUS,
          totalDeposits: 0,
          totalWithdrawals: 0,
          totalEarnings: WELCOME_BONUS,
          totalRefEarnings: 0,
          activeInvestments: 0,
          referralCount: 0,
          level1Count: 0,
          level2Count: 0,
          level3Count: 0,
          emailVerified: false,
          isAdmin: false,
          createdAt: serverTimestamp(),
          lastLogin: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        // Welcome bonus transaction
        try {
          await setDoc(doc(collection(db, `users/${newUserId}/transactions`)), {
            type: 'welcome_bonus',
            amount: WELCOME_BONUS,
            status: 'completed',
            description: '🎁 Welcome Bonus — Welcome to Finoxa!',
            createdAt: serverTimestamp()
          });
        } catch (_) {}

        // 🔥 SAME REFERRAL CHAIN LOGIC (with updated rates)
        if (level1Referrer) {
          const batch = writeBatch(db);
          let currentUpliner = level1Referrer;
          const levels = [
            { level: 1, rate: REFERRAL_RATES[1] },
            { level: 2, rate: REFERRAL_RATES[2] },
            { level: 3, rate: REFERRAL_RATES[3] }
          ];

          for (const lvl of levels) {
            if (!currentUpliner) break;

            const refDocRef = doc(db, `users/${currentUpliner}/referrals`, newUserId);
            batch.set(refDocRef, {
              referredUserId: newUserId,
              referredUserName: name,
              referredUserEmail: email,
              referredUsername: username,
              level: lvl.level,
              commission: lvl.rate,
              referredAt: serverTimestamp(),
              totalEarned: 0,
              lastInvestment: null
            });

            const uplinerRef = doc(db, 'users', currentUpliner);
            batch.update(uplinerRef, {
              referralCount: increment(lvl.level === 1 ? 1 : 0),
              [`level${lvl.level}Count`]: increment(1)
            });

            try {
              const uplinerDoc = await getDoc(doc(db, 'users', currentUpliner));
              if (uplinerDoc.exists()) {
                currentUpliner = lvl.level === 1 ? uplinerDoc.data().referredBy :
                                lvl.level === 2 ? uplinerDoc.data().level2Referrer : null;
              } else { break; }
            } catch { break; }
          }

          await batch.commit();
        }

        showToast('🎉 Welcome to Finoxa!', `₦${WELCOME_BONUS.toLocaleString()} bonus added to your wallet!`, 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);

      } catch (error) {
        console.error('Registration error:', error);
        let message = 'Please try again.';
        if (error.code === 'auth/email-already-in-use') message = 'Email already registered.';
        else if (error.code === 'auth/invalid-email') message = 'Invalid email format.';
        else if (error.code === 'auth/weak-password') message = 'Password too weak.';
        
        showToast('Registration Failed', message, 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-user-check"></i> Create Free Account';
      }
    });
  </script>
</body>
</html>
