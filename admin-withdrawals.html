<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finoxa Admin • Withdrawals Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1a1a1a;
      --admin: #dc2626; --admin-light: #ef4444;
      --orange: #f97316; --amber: #f59e0b; --green: #22c55e;
      --text: #ffffff; --text2: #a0a0a0; --text3: #666666;
      --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.04);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; overflow-x: hidden;
    }

    /* Success Popup */
    .success-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      z-index: 10000; display: none;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .success-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .success-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 24px; padding: 2.5rem 2rem; max-width: 450px; width: 100%;
      text-align: center; animation: popIn 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .success-icon-circle {
      width: 80px; height: 80px; margin: 0 auto 1.5rem;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    .success-icon-circle.approved { background: rgba(34,197,94,0.1); border: 3px solid #22c55e; color: #4ade80; }
    .success-icon-circle.rejected { background: rgba(239,68,68,0.1); border: 3px solid #ef4444; color: #f87171; }
    .success-card h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem; margin-bottom: 0.5rem; color: #fff;
    }
    .success-card .amount-big {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.2rem; font-weight: 700; margin: 0.8rem 0;
    }
    .success-card .amount-big.approved { color: #4ade80; }
    .success-card .amount-big.rejected { color: #f87171; }
    .success-card .user-name-display {
      font-size: 1rem; color: #fb923c; margin-bottom: 0.3rem;
    }
    .success-card p { font-size: 0.85rem; color: var(--text2); line-height: 1.5; margin-bottom: 1.5rem; }
    .success-card button {
      padding: 0.8rem 2rem; color: #fff;
      border: none; border-radius: 12px; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s;
    }
    .success-card button.btn-green { background: var(--green); }
    .success-card button.btn-green:hover { background: #16a34a; }
    .success-card button.btn-red { background: var(--admin); }
    .success-card button.btn-red:hover { background: #b91c1c; }

    /* Toast */
    .admin-toast {
      position: fixed; bottom: 25px; right: 25px; z-index: 10001;
      background: rgba(18,18,18,0.95); backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
      padding: 0.9rem 1.2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      display: flex; align-items: center; gap: 0.8rem;
      animation: toastIn 0.4s ease; min-width: 300px; max-width: 420px;
    }
    .admin-toast.success { border-left: 4px solid #22c55e; }
    .admin-toast.error { border-left: 4px solid #ef4444; }
    .admin-toast.warning { border-left: 4px solid #f59e0b; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .toast-icon-bx {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0;
    }
    .toast-icon-bx.success { background: rgba(34,197,94,0.12); color: #4ade80; }
    .toast-icon-bx.error { background: rgba(239,68,68,0.12); color: #f87171; }
    .toast-icon-bx.warning { background: rgba(245,158,11,0.12); color: #fbbf24; }
    .toast-txt h4 { font-size: 0.8rem; font-weight: 700; color: #fff; margin-bottom: 0.1rem; }
    .toast-txt p { font-size: 0.7rem; color: rgba(255,255,255,0.5); }

    /* Sidebar */
    .sidebar {
      width: 250px; height: 100vh; background: var(--surface);
      border-right: 1px solid var(--border); padding: 1.5rem;
      display: flex; flex-direction: column; position: fixed;
      left: 0; top: 0; z-index: 100; transition: transform 0.3s;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 0.7rem;
      margin-bottom: 2rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border);
    }
    .sidebar-logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, rgba(239,68,68,0.2), rgba(249,115,22,0.15));
      border: 2px solid rgba(239,68,68,0.3); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .sidebar-brand h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      background: linear-gradient(135deg, #f87171, #fb923c, #fbbf24);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .admin-tag { font-size: 0.6rem; color: #f87171; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }

    .sidebar-nav { display: flex; flex-direction: column; gap: 0.2rem; flex: 1; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.65rem 0.85rem; border-radius: 10px;
      color: var(--text2); text-decoration: none;
      font-weight: 500; font-size: 0.83rem; transition: all 0.3s;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active {
      background: linear-gradient(135deg, rgba(239,68,68,0.12), rgba(249,115,22,0.08));
      color: #fff;
    }
    .sidebar-nav a i { width: 18px; text-align: center; }
    .sidebar-nav a .badge {
      margin-left: auto; background: var(--amber); color: #000;
      font-size: 0.6rem; padding: 0.12rem 0.45rem; border-radius: 20px; font-weight: 700;
    }

    .sidebar-user {
      margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.6rem;
    }
    .sidebar-avatar {
      width: 36px; height: 36px; background: linear-gradient(135deg, #dc2626, #ef4444);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem;
    }
    .sidebar-user-info { flex: 1; min-width: 0; }
    .sidebar-user-info .uname { font-weight: 600; font-size: 0.78rem; }
    .sidebar-user-info .urole { color: #f87171; font-size: 0.62rem; }
    .sidebar-logout {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px; color: #f87171; cursor: pointer;
      font-size: 0.8rem; padding: 0.35rem 0.55rem; transition: all 0.3s;
    }

    /* Main Content */
    .main-content {
      flex: 1; margin-left: 250px; padding: 1.5rem 2rem; min-height: 100vh;
    }

    .menu-toggle {
      display: none; position: fixed; top: 1rem; left: 1rem; z-index: 200;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; width: 40px; height: 40px;
      align-items: center; justify-content: center;
      color: #fff; font-size: 1.1rem; cursor: pointer;
    }

    .page-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
    }
    .page-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      display: flex; align-items: center; gap: 0.5rem;
    }

    .refresh-btn {
      padding: 0.5rem 1rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text2); cursor: pointer; font-size: 0.75rem;
      font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600;
      display: flex; align-items: center; gap: 0.4rem; transition: all 0.3s;
    }
    .refresh-btn:hover { border-color: rgba(255,255,255,0.2); color: #fff; }

    /* Filter Tabs */
    .filter-tabs {
      display: flex; gap: 0.3rem; margin-bottom: 1.2rem; flex-wrap: wrap;
    }
    .filter-tab {
      padding: 0.5rem 1rem; border-radius: 20px;
      font-size: 0.73rem; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); transition: all 0.3s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .filter-tab:hover { border-color: rgba(255,255,255,0.2); }
    .filter-tab.active { background: var(--admin); color: #fff; border-color: var(--admin); }
    .filter-tab .ft-count {
      font-size: 0.65rem; padding: 0.1rem 0.4rem;
      border-radius: 10px; margin-left: 0.3rem;
    }

    /* Search */
    .search-wrap {
      position: relative; margin-bottom: 1rem; max-width: 350px;
    }
    .search-wrap input {
      width: 100%; padding: 0.65rem 1rem 0.65rem 2.4rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; color: #fff; font-size: 0.82rem;
      font-family: 'Plus Jakarta Sans', sans-serif; outline: none;
    }
    .search-wrap i {
      position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%);
      color: var(--text3); font-size: 0.75rem;
    }

    /* Table */
    .table-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; margin-bottom: 1rem;
    }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    th {
      text-align: left; padding: 0.7rem;
      color: var(--text3); font-weight: 600; font-size: 0.62rem;
      text-transform: uppercase; letter-spacing: 0.04em;
      background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border);
    }
    td {
      padding: 0.6rem 0.7rem; border-bottom: 1px solid var(--border2);
      white-space: nowrap;
    }
    tr:hover td { background: rgba(255,255,255,0.01); }

    .status-badge {
      padding: 0.15rem 0.5rem; border-radius: 10px;
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    }
    .status-badge.pending { background: rgba(245,158,11,0.1); color: #fbbf24; }
    .status-badge.approved { background: rgba(34,197,94,0.1); color: #4ade80; }
    .status-badge.rejected { background: rgba(239,68,68,0.1); color: #f87171; }

    .action-btns { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .action-btn {
      padding: 0.3rem 0.6rem; border-radius: 6px;
      font-size: 0.65rem; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); transition: all 0.3s;
      font-family: 'Plus Jakarta Sans', sans-serif; white-space: nowrap;
    }
    .action-btn:hover { border-color: rgba(255,255,255,0.2); color: #fff; }
    .action-btn.approve { color: #4ade80; }
    .action-btn.approve:hover { background: rgba(34,197,94,0.1); }
    .action-btn.reject { color: #f87171; }
    .action-btn.reject:hover { background: rgba(239,68,68,0.1); }

    .empty-state { text-align: center; padding: 3rem; color: var(--text3); }
    .empty-state i { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.3; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 1rem; }
      .menu-toggle { display: flex; }
    }
  </style>
</head>
<body>

  <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>

  <!-- Success Popup -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-card">
      <div class="success-icon-circle" id="successIcon"></div>
      <h2 id="successTitle"></h2>
      <div class="user-name-display" id="successUserName"></div>
      <div class="amount-big" id="successAmount"></div>
      <p id="successMessage"></p>
      <button id="successCloseBtn" onclick="closeSuccessPopup()">Continue</button>
    </div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">🛡️</div>
      <div><h2>Finoxa</h2><div class="admin-tag">Admin Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="admin-index.html"><i class="fas fa-grid-2"></i> Dashboard</a>
      <a href="admin-users.html"><i class="fas fa-users"></i> Users</a>
      <a href="admin-deposits.html"><i class="fas fa-arrow-down"></i> Deposits</a>
      <a href="admin-withdrawals.html" class="active"><i class="fas fa-arrow-up"></i> Withdrawals <span class="badge" id="sidePending">0</span></a>
      <a href="admin-investments.html"><i class="fas fa-rocket"></i> Investments</a>
      <a href="admin-referrals.html"><i class="fas fa-share-nodes"></i> Referrals</a>
      <a href="admin-transactions.html"><i class="fas fa-clock-rotate-left"></i> Transactions</a>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sideAvatar">A</div>
      <div class="sidebar-user-info">
        <div class="uname" id="sideName">Admin</div>
        <div class="urole">Administrator</div>
      </div>
      <button class="sidebar-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <h1><i class="fas fa-arrow-up"></i> Withdrawals Management</h1>
      <button class="refresh-btn" onclick="loadAllWithdrawals()">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all" onclick="filterWithdrawals('all')">All<span class="ft-count" id="countAll">0</span></button>
      <button class="filter-tab" data-filter="pending" onclick="filterWithdrawals('pending')">Pending<span class="ft-count" id="countPending">0</span></button>
      <button class="filter-tab" data-filter="approved" onclick="filterWithdrawals('approved')">Approved<span class="ft-count" id="countApproved">0</span></button>
      <button class="filter-tab" data-filter="rejected" onclick="filterWithdrawals('rejected')">Rejected<span class="ft-count" id="countRejected">0</span></button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search by name, username, bank, or withdrawal ID..." oninput="renderTable()">
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>WTH ID</th>
              <th>User</th>
              <th>Amount</th>
              <th>Charge</th>
              <th>Net Payable</th>
              <th>Bank</th>
              <th>Account No.</th>
              <th>Account Name</th>
              <th>Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="11"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading withdrawals...</p></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, getDocs, setDoc, collection, updateDoc, increment, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAYw02OLQ-AOun_0YLzTd7DaCLsHQqHxGk",
      authDomain: "finexo-3afc7.firebaseapp.com",
      projectId: "finexo-3afc7",
      storageBucket: "finexo-3afc7.firebasestorage.app",
      messagingSenderId: "443358513817",
      appId: "1:443358513817:web:756f9aa5e02dc05ca84608"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const fm = (v) => "₦" + Number(v || 0).toLocaleString();
    let allWithdrawals = [];
    let currentFilter = 'all';

    // Toast
    function showToast(title, message, type = 'success') {
      const existing = document.querySelector('.admin-toast');
      if (existing) existing.remove();
      const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
      const toast = document.createElement('div');
      toast.className = `admin-toast ${type}`;
      toast.innerHTML = `<div class="toast-icon-bx ${type}"><i class="fas ${icons[type]}"></i></div><div class="toast-txt"><h4>${title}</h4><p>${message}</p></div>`;
      document.body.appendChild(toast);
      setTimeout(() => {
        if (toast.parentNode) {
          toast.style.opacity = '0'; toast.style.transform = 'translateY(20px)';
          toast.style.transition = 'all 0.3s';
          setTimeout(() => toast.remove(), 300);
        }
      }, 4000);
    }

    // Success Popup
    window.closeSuccessPopup = function() {
      document.getElementById('successOverlay').classList.remove('show');
      loadAllWithdrawals();
    };

    function showSuccessPopup(type, userName, amount, netAmount) {
      const overlay = document.getElementById('successOverlay');
      const icon = document.getElementById('successIcon');
      const title = document.getElementById('successTitle');
      const amountEl = document.getElementById('successAmount');
      const message = document.getElementById('successMessage');
      const btn = document.getElementById('successCloseBtn');
      const userNameEl = document.getElementById('successUserName');

      icon.className = 'success-icon-circle ' + type;
      amountEl.className = 'amount-big ' + type;
      btn.className = type === 'approved' ? 'btn-green' : 'btn-red';

      if (type === 'approved') {
        icon.innerHTML = '<i class="fas fa-check-circle"></i>';
        title.textContent = 'Withdrawal Approved! ✅';
        amountEl.textContent = fm(netAmount) + ' Paid';
        message.textContent = `Net amount of ${fm(netAmount)} has been sent to ${userName}'s bank account.`;
        userNameEl.textContent = userName;
      } else {
        icon.innerHTML = '<i class="fas fa-undo"></i>';
        title.textContent = 'Withdrawal Rejected & Refunded';
        amountEl.textContent = fm(amount) + ' Refunded';
        message.textContent = `${fm(amount)} has been returned to ${userName}'s wallet balance.`;
        userNameEl.textContent = userName;
      }

      overlay.classList.add('show');
    }

    // Format Date
    function fmtDate(ts) {
      if (!ts) return '—';
      try {
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) +
               ', ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      } catch(e) { return '—'; }
    }

    // Mobile menu
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      const result = await Swal.fire({
        title: 'Logout?',
        text: 'Are you sure you want to logout?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Logout',
        confirmButtonColor: '#ef4444'
      });
      if (result.isConfirmed) {
        await signOut(auth);
        window.location.href = 'admin-login.html';
      }
    });

    // Auth
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'admin-login.html'; return; }
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (!userDoc.exists() || userDoc.data().isAdmin !== true) {
          await signOut(auth);
          window.location.href = 'admin-login.html';
          return;
        }
        document.getElementById('sideName').textContent = userDoc.data().fullName || 'Admin';
        document.getElementById('sideAvatar').textContent = (userDoc.data().fullName || 'A').charAt(0).toUpperCase();
        await loadAllWithdrawals();
      } catch(e) { window.location.href = 'admin-login.html'; }
    });

    // Load Withdrawals
    window.loadAllWithdrawals = async function() {
      allWithdrawals = [];
      try {
        const usersSnap = await getDocs(collection(db, 'users'));
        
        for (const userDoc of usersSnap.docs) {
          const userId = userDoc.id;
          const userData = userDoc.data();
          try {
            const wthSnap = await getDocs(collection(db, `users/${userId}/withdrawals`));
            wthSnap.forEach(d => {
              const wData = d.data();
              allWithdrawals.push({
                id: d.id,
                userId: userId,
                userName: userData.fullName || wData.username || 'Unknown',
                userUsername: userData.username || 'unknown',
                userEmail: userData.email || wData.userEmail || '',
                ...wData
              });
            });
          } catch(e) {
            // Skip users with no withdrawals
          }
        }

        allWithdrawals.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));

        const pending = allWithdrawals.filter(d => d.status === 'pending').length;
        const approved = allWithdrawals.filter(d => d.status === 'approved').length;
        const rejected = allWithdrawals.filter(d => d.status === 'rejected').length;

        document.getElementById('countAll').textContent = allWithdrawals.length;
        document.getElementById('countPending').textContent = pending;
        document.getElementById('countApproved').textContent = approved;
        document.getElementById('countRejected').textContent = rejected;
        document.getElementById('sidePending').textContent = pending;

        renderTable();
      } catch(e) {
        console.error('Load error:', e);
        showToast('Error', 'Failed to load withdrawals', 'error');
      }
    };

    // Filter
    window.filterWithdrawals = function(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.filter-tab[data-filter="${filter}"]`).classList.add('active');
      renderTable();
    };

    // Render
    window.renderTable = function() {
      const search = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
      let filtered = [...allWithdrawals];

      if (currentFilter !== 'all') {
        filtered = filtered.filter(d => d.status === currentFilter);
      }

      if (search) {
        filtered = filtered.filter(d =>
          (d.userName || '').toLowerCase().includes(search) ||
          (d.userUsername || '').toLowerCase().includes(search) ||
          (d.id || '').toLowerCase().includes(search) ||
          (d.bankName || '').toLowerCase().includes(search) ||
          (d.accountNumber || '').toLowerCase().includes(search) ||
          (d.accountName || '').toLowerCase().includes(search)
        );
      }

      const tbody = document.getElementById('tableBody');
      if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="11"><div class="empty-state"><i class="fas fa-inbox"></i><p>No withdrawals found</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(d => {
        const status = d.status || 'pending';
        const isPending = status === 'pending';
        const charge = d.charge || Math.floor((d.amount || 0) * 0.15);
        const netAmount = d.netAmount || ((d.amount || 0) - charge);

        return `
          <tr>
            <td style="font-family:monospace;font-size:0.7rem;">${d.id?.substring(0,12)}...</td>
            <td>
              <div style="font-weight:600;font-size:0.78rem;">${d.userName}</div>
              <div style="font-size:0.65rem;color:#fb923c;">@${d.userUsername}</div>
            </td>
            <td style="font-weight:700;">${fm(d.amount || 0)}</td>
            <td style="color:#f87171;">-${fm(charge)}</td>
            <td style="color:#4ade80;font-weight:700;">${fm(netAmount)}</td>
            <td style="font-size:0.72rem;">${d.bankName || '—'}</td>
            <td style="font-size:0.72rem;">${d.accountNumber || '—'}</td>
            <td style="font-size:0.72rem;">${d.accountName || '—'}</td>
            <td style="font-size:0.7rem;color:var(--text3);">${fmtDate(d.createdAt)}</td>
            <td><span class="status-badge ${status}">${status}</span></td>
            <td>
              <div class="action-btns">
                ${isPending ? `<button class="action-btn approve" onclick="approveWithdrawal('${d.userId}','${d.id}')"><i class="fas fa-check"></i> Approve</button>` : ''}
                ${isPending ? `<button class="action-btn reject" onclick="rejectWithdrawal('${d.userId}','${d.id}')"><i class="fas fa-undo"></i> Reject & Refund</button>` : ''}
                ${!isPending ? `<span style="color:var(--text3);font-size:0.65rem;">${status === 'approved' ? '✅ Paid' : '❌ Refunded'}</span>` : ''}
              </div>
            </td>
          </tr>
        `;
      }).join('');
    };

    // 🔥 APPROVE WITHDRAWAL - FIXED
    window.approveWithdrawal = async function(userId, withdrawalId) {
      const wth = allWithdrawals.find(d => d.id === withdrawalId && d.userId === userId);
      if (!wth) return showToast('Error', 'Withdrawal not found', 'error');
      
      const amount = wth.amount || 0;
      const netAmount = wth.netAmount || (amount - Math.floor(amount * 0.15));
      const userName = wth.userName || 'User';

      const result = await Swal.fire({
        title: 'Approve Withdrawal?',
        html: `
          <div style="text-align:left;background:rgba(255,255,255,0.02);border-radius:12px;padding:1rem;margin:0.5rem 0;font-size:0.82rem;">
            <p><strong>User:</strong> ${userName}</p>
            <p><strong>Amount:</strong> ${fm(amount)}</p>
            <p><strong>Net Payable:</strong> <span style="color:#4ade80;">${fm(netAmount)}</span></p>
            <p><strong>Bank:</strong> ${wth.bankName} - ${wth.accountNumber}</p>
            <p><strong>Account:</strong> ${wth.accountName}</p>
          </div>
          <p style="color:#4ade80;font-weight:600;">Confirm that you have sent ${fm(netAmount)} to this user.</p>
        `,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Yes, Mark as Paid',
        confirmButtonColor: '#22c55e',
        cancelButtonColor: '#6b7280'
      });

      if (!result.isConfirmed) return;

      Swal.fire({
        title: 'Processing...',
        text: 'Updating withdrawal status',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
      });

      try {
        // Step 1: Update withdrawal status
        await updateDoc(doc(db, `users/${userId}/withdrawals`, withdrawalId), {
          status: 'approved',
          approvedAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
        console.log('✅ Withdrawal status updated to approved');

        // Step 2: Find and update the pending transaction record
        const txSnap = await getDocs(
          query(collection(db, `users/${userId}/transactions`), where('withdrawalId', '==', withdrawalId))
        );
        
        if (!txSnap.empty) {
          // Update existing pending transaction
          const txDoc = txSnap.docs[0];
          await updateDoc(doc(db, `users/${userId}/transactions`, txDoc.id), {
            status: 'completed',
            description: `Withdrawal approved - Net paid: ${fm(netAmount)} to ${wth.bankName}`,
            updatedAt: serverTimestamp()
          });
          console.log('✅ Existing transaction updated to completed');
        } else {
          // Create new transaction record
          await setDoc(doc(collection(db, `users/${userId}/transactions`)), {
            type: 'withdrawal_approved',
            amount: amount,
            status: 'completed',
            description: `Withdrawal approved - Net paid: ${fm(netAmount)} to ${wth.bankName}`,
            withdrawalId: withdrawalId,
            createdAt: serverTimestamp()
          });
          console.log('✅ New transaction record created');
        }

        // Step 3: Update local array
        const idx = allWithdrawals.findIndex(d => d.id === withdrawalId && d.userId === userId);
        if (idx >= 0) allWithdrawals[idx].status = 'approved';

        Swal.close();
        
        // Show success popup
        showSuccessPopup('approved', userName, amount, netAmount);

      } catch(e) {
        console.error('❌ Approve error:', e);
        Swal.fire({
          icon: 'error',
          title: 'Approval Failed',
          text: e.message || 'Could not approve withdrawal',
          confirmButtonColor: '#ef4444'
        });
      }
    };

    // 🔥 REJECT & REFUND WITHDRAWAL - FIXED
    window.rejectWithdrawal = async function(userId, withdrawalId) {
      const wth = allWithdrawals.find(d => d.id === withdrawalId && d.userId === userId);
      if (!wth) return showToast('Error', 'Withdrawal not found', 'error');
      
      const amount = wth.amount || 0;
      const userName = wth.userName || 'User';

      const result = await Swal.fire({
        title: 'Reject & Refund?',
        html: `
          <div style="text-align:left;background:rgba(255,255,255,0.02);border-radius:12px;padding:1rem;margin:0.5rem 0;font-size:0.82rem;">
            <p><strong>User:</strong> ${userName}</p>
            <p><strong>Amount to Refund:</strong> <span style="color:#f87171;">${fm(amount)}</span></p>
            <p><strong>Bank:</strong> ${wth.bankName} - ${wth.accountNumber}</p>
          </div>
          <p style="color:#f87171;font-weight:600;">This will return ${fm(amount)} to the user's wallet balance.</p>
        `,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Yes, Reject & Refund',
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#6b7280'
      });

      if (!result.isConfirmed) return;

      Swal.fire({
        title: 'Processing...',
        text: 'Rejecting withdrawal and refunding wallet',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
      });

      try {
        // Step 1: Update withdrawal status
        await updateDoc(doc(db, `users/${userId}/withdrawals`, withdrawalId), {
          status: 'rejected',
          rejectedAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
        console.log('✅ Withdrawal status updated to rejected');

        // Step 2: REFUND - Credit wallet back
        await updateDoc(doc(db, 'users', userId), {
          wallet: increment(amount),
          totalWithdrawals: increment(-amount),
          updatedAt: serverTimestamp()
        });
        console.log('✅ Wallet refunded with', amount);

        // Step 3: Find and update existing transaction
        const txSnap = await getDocs(
          query(collection(db, `users/${userId}/transactions`), where('withdrawalId', '==', withdrawalId))
        );
        
        if (!txSnap.empty) {
          const txDoc = txSnap.docs[0];
          await updateDoc(doc(db, `users/${userId}/transactions`, txDoc.id), {
            status: 'rejected',
            description: `Withdrawal rejected - ${fm(amount)} refunded to wallet`,
            updatedAt: serverTimestamp()
          });
          console.log('✅ Existing transaction updated to rejected');
        }

        // Create refund transaction record
        await setDoc(doc(collection(db, `users/${userId}/transactions`)), {
          type: 'withdrawal_refund',
          amount: amount,
          status: 'completed',
          description: `Withdrawal rejected - ${fm(amount)} refunded to wallet`,
          withdrawalId: withdrawalId,
          createdAt: serverTimestamp()
        });
        console.log('✅ Refund transaction record created');

        // Step 4: Update local array
        const idx = allWithdrawals.findIndex(d => d.id === withdrawalId && d.userId === userId);
        if (idx >= 0) allWithdrawals[idx].status = 'rejected';

        Swal.close();
        
        // Show success popup
        showSuccessPopup('rejected', userName, amount, 0);

      } catch(e) {
        console.error('❌ Reject error:', e);
        Swal.fire({
          icon: 'error',
          title: 'Rejection Failed',
          text: e.message || 'Could not reject withdrawal',
          confirmButtonColor: '#ef4444'
        });
      }
    };

    console.log('🛡️ Admin Withdrawals Page Ready - Fully Fixed');
  </script>
</body>
</html>
