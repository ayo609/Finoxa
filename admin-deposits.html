<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finoxa Admin • Deposits Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1a1a1a;
      --admin: #dc2626; --admin-light: #ef4444;
      --orange: #f97316; --amber: #f59e0b; --green: #22c55e;
      --text: #ffffff; --text2: #a0a0a0; --text3: #666666;
      --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.04);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; overflow-x: hidden;
    }

    /* ============ TOAST ============ */
    .admin-toast {
      position: fixed; bottom: 25px; right: 25px; z-index: 10000;
      background: rgba(18,18,18,0.95); backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
      padding: 0.9rem 1.2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      display: flex; align-items: center; gap: 0.8rem;
      animation: toastIn 0.4s ease; min-width: 300px; max-width: 420px;
    }
    .admin-toast.success { border-bottom: 3px solid #22c55e; }
    .admin-toast.error { border-bottom: 3px solid #ef4444; }
    .admin-toast.warning { border-bottom: 3px solid #f59e0b; }
    .admin-toast.info { border-bottom: 3px solid #60a5fa; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .toast-icon-bx {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0;
    }
    .toast-icon-bx.success { background: rgba(34,197,94,0.12); color: #4ade80; }
    .toast-icon-bx.error { background: rgba(239,68,68,0.12); color: #f87171; }
    .toast-icon-bx.warning { background: rgba(245,158,11,0.12); color: #fbbf24; }
    .toast-icon-bx.info { background: rgba(96,165,250,0.12); color: #60a5fa; }
    .toast-txt h4 { font-size: 0.8rem; font-weight: 700; color: #fff; margin-bottom: 0.1rem; }
    .toast-txt p { font-size: 0.7rem; color: rgba(255,255,255,0.5); }

    /* ============ CONFIRM BAR ============ */
    .confirm-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      background: var(--surface2); border-bottom: 1px solid var(--border);
      padding: 0.8rem 1.5rem; display: none;
      align-items: center; justify-content: center; gap: 1rem;
      animation: slideDown 0.3s ease;
    }
    .confirm-bar.show { display: flex; }
    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }
    .confirm-bar p { font-size: 0.85rem; color: var(--text2); }
    .confirm-bar .cb-btns { display: flex; gap: 0.5rem; }
    .confirm-bar button {
      padding: 0.4rem 1rem; border-radius: 8px; font-weight: 600;
      font-size: 0.75rem; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
      border: none; transition: all 0.3s;
    }
    .cb-confirm { background: var(--admin); color: #fff; }
    .cb-cancel { background: rgba(255,255,255,0.05); color: var(--text2); border: 1px solid var(--border); }

    /* ============ SIDEBAR ============ */
    .sidebar {
      width: 250px; height: 100vh; background: var(--surface);
      border-right: 1px solid var(--border); padding: 1.5rem;
      display: flex; flex-direction: column; position: fixed;
      left: 0; top: 0; z-index: 100; transition: transform 0.3s;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 0.7rem;
      margin-bottom: 2rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border);
    }
    .sidebar-logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, rgba(239,68,68,0.2), rgba(249,115,22,0.15));
      border: 2px solid rgba(239,68,68,0.3); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .sidebar-brand h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      background: linear-gradient(135deg, #f87171, #fb923c, #fbbf24);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .admin-tag { font-size: 0.6rem; color: #f87171; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }

    .sidebar-nav { display: flex; flex-direction: column; gap: 0.2rem; flex: 1; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.65rem 0.85rem; border-radius: 10px;
      color: var(--text2); text-decoration: none;
      font-weight: 500; font-size: 0.83rem; transition: all 0.3s;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active {
      background: linear-gradient(135deg, rgba(239,68,68,0.12), rgba(249,115,22,0.08));
      color: #fff;
    }
    .sidebar-nav a i { width: 18px; text-align: center; }
    .sidebar-nav a .badge {
      margin-left: auto; background: var(--amber); color: #000;
      font-size: 0.6rem; padding: 0.12rem 0.45rem; border-radius: 20px; font-weight: 700;
    }

    .sidebar-user {
      margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.6rem;
    }
    .sidebar-avatar {
      width: 36px; height: 36px; background: linear-gradient(135deg, #dc2626, #ef4444);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem;
    }
    .sidebar-user-info { flex: 1; min-width: 0; }
    .sidebar-user-info .uname { font-weight: 600; font-size: 0.78rem; }
    .sidebar-user-info .urole { color: #f87171; font-size: 0.62rem; }
    .sidebar-logout {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px; color: #f87171; cursor: pointer;
      font-size: 0.8rem; padding: 0.35rem 0.55rem; transition: all 0.3s;
    }
    .sidebar-logout:hover { background: rgba(239,68,68,0.2); }

    /* ============ MAIN CONTENT ============ */
    .main-content {
      flex: 1; margin-left: 250px; padding: 1.5rem 2rem; min-height: 100vh;
    }

    .menu-toggle {
      display: none; position: fixed; top: 1rem; left: 1rem; z-index: 200;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; width: 40px; height: 40px;
      align-items: center; justify-content: center;
      color: #fff; font-size: 1.1rem; cursor: pointer;
    }

    .page-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
    }
    .page-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .page-header h1 i { color: #f87171; }

    /* Filter Tabs */
    .filter-tabs {
      display: flex; gap: 0.3rem; margin-bottom: 1.2rem; flex-wrap: wrap;
    }
    .filter-tab {
      padding: 0.5rem 1rem; border-radius: 20px;
      font-size: 0.73rem; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); transition: all 0.3s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .filter-tab:hover { border-color: rgba(255,255,255,0.2); }
    .filter-tab.active { background: var(--admin); color: #fff; border-color: var(--admin); }
    .filter-tab .ft-count {
      font-size: 0.65rem; padding: 0.1rem 0.4rem;
      border-radius: 10px; margin-left: 0.3rem;
    }
    .filter-tab.active .ft-count { background: rgba(255,255,255,0.2); }

    /* Search */
    .search-wrap {
      position: relative; margin-bottom: 1rem; max-width: 350px;
    }
    .search-wrap input {
      width: 100%; padding: 0.65rem 1rem 0.65rem 2.4rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; color: #fff; font-size: 0.82rem;
      font-family: 'Plus Jakarta Sans', sans-serif; outline: none;
    }
    .search-wrap i {
      position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%);
      color: var(--text3); font-size: 0.75rem;
    }

    /* Table */
    .table-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; margin-bottom: 1rem;
    }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    th {
      text-align: left; padding: 0.7rem 0.7rem;
      color: var(--text3); font-weight: 600; font-size: 0.62rem;
      text-transform: uppercase; letter-spacing: 0.04em;
      background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border);
    }
    td {
      padding: 0.6rem 0.7rem; border-bottom: 1px solid var(--border2);
      white-space: nowrap;
    }
    tr:hover td { background: rgba(255,255,255,0.01); }

    .status-badge {
      padding: 0.15rem 0.5rem; border-radius: 10px;
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    }
    .status-badge.pending { background: rgba(245,158,11,0.1); color: #fbbf24; }
    .status-badge.approved { background: rgba(34,197,94,0.1); color: #4ade80; }
    .status-badge.rejected { background: rgba(239,68,68,0.1); color: #f87171; }

    .action-btns { display: flex; gap: 0.25rem; }
    .action-btn {
      padding: 0.25rem 0.5rem; border-radius: 6px;
      font-size: 0.6rem; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); transition: all 0.3s;
      font-family: 'Plus Jakarta Sans', sans-serif; white-space: nowrap;
    }
    .action-btn:hover { border-color: rgba(255,255,255,0.2); color: #fff; }
    .action-btn.view { color: #60a5fa; }
    .action-btn.approve { color: #4ade80; }
    .action-btn.reject { color: #f87171; }

    .empty-state { text-align: center; padding: 3rem; color: var(--text3); }
    .empty-state i { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.3; }

    /* Screenshot Modal */
    .screenshot-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      z-index: 1000; display: none;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .screenshot-overlay.show { display: flex; }
    .screenshot-overlay img {
      max-width: 95%; max-height: 90vh; border-radius: 12px;
      border: 1px solid var(--border);
    }
    .screenshot-close {
      position: absolute; top: 1rem; right: 1rem;
      width: 40px; height: 40px; background: rgba(0,0,0,0.6);
      border: 1px solid var(--border); border-radius: 10px;
      color: #fff; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 1rem; }
      .menu-toggle { display: flex; }
      .page-header h1 { font-size: 1.2rem; }
      .admin-toast { left: 1rem; right: 1rem; min-width: auto; }
    }
  </style>
</head>
<body>

  <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>

  <!-- Confirm Bar -->
  <div class="confirm-bar" id="confirmBar">
    <p id="confirmMsg">Are you sure?</p>
    <div class="cb-btns">
      <button class="cb-cancel" onclick="hideConfirm()">Cancel</button>
      <button class="cb-confirm" id="confirmActionBtn">Confirm</button>
    </div>
  </div>

  <!-- Screenshot Modal -->
  <div class="screenshot-overlay" id="screenshotModal">
    <button class="screenshot-close" onclick="closeScreenshot()"><i class="fas fa-times"></i></button>
    <img id="screenshotImg" src="" alt="Payment Screenshot">
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">🛡️</div>
      <div><h2>Finoxa</h2><div class="admin-tag">Admin Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="admin-index.html"><i class="fas fa-grid-2"></i> Dashboard</a>
      <a href="admin-users.html"><i class="fas fa-users"></i> Users</a>
      <a href="admin-deposits.html" class="active"><i class="fas fa-arrow-down"></i> Deposits <span class="badge" id="sidePending">0</span></a>
      <a href="admin-withdrawals.html"><i class="fas fa-arrow-up"></i> Withdrawals</a>
      <a href="admin-investments.html"><i class="fas fa-rocket"></i> Investments</a>
      <a href="admin-referrals.html"><i class="fas fa-share-nodes"></i> Referrals</a>
      <a href="admin-transactions.html"><i class="fas fa-clock-rotate-left"></i> Transactions</a>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sideAvatar">A</div>
      <div class="sidebar-user-info">
        <div class="uname" id="sideName">Admin</div>
        <div class="urole">Administrator</div>
      </div>
      <button class="sidebar-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <h1><i class="fas fa-arrow-down"></i> Deposits Management</h1>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all" onclick="filterDeposits('all')">All<span class="ft-count" id="countAll">0</span></button>
      <button class="filter-tab" data-filter="pending" onclick="filterDeposits('pending')">Pending<span class="ft-count" id="countPending">0</span></button>
      <button class="filter-tab" data-filter="approved" onclick="filterDeposits('approved')">Approved<span class="ft-count" id="countApproved">0</span></button>
      <button class="filter-tab" data-filter="rejected" onclick="filterDeposits('rejected')">Rejected<span class="ft-count" id="countRejected">0</span></button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search by name, username, or deposit ID..." oninput="renderTable()">
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Deposit ID</th>
              <th>User</th>
              <th>Amount</th>
              <th>Method</th>
              <th>Sender</th>
              <th>Account</th>
              <th>Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="9"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading deposits...</p></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, getDocs, setDoc, collection, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAYw02OLQ-AOun_0YLzTd7DaCLsHQqHxGk",
      authDomain: "finexo-3afc7.firebaseapp.com",
      projectId: "finexo-3afc7",
      storageBucket: "finexo-3afc7.firebasestorage.app",
      messagingSenderId: "443358513817",
      appId: "1:443358513817:web:756f9aa5e02dc05ca84608"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const fm = (v) => "₦" + Number(v || 0).toLocaleString();
    let allDeposits = [];
    let currentFilter = 'all';
    let confirmCallback = null;

    // Toast
    function showToast(title, message, type = 'success') {
      const existing = document.querySelector('.admin-toast');
      if (existing) existing.remove();
      const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
      const toast = document.createElement('div');
      toast.className = `admin-toast ${type}`;
      toast.innerHTML = `<div class="toast-icon-bx ${type}"><i class="fas ${icons[type]}"></i></div><div class="toast-txt"><h4>${title}</h4><p>${message}</p></div>`;
      document.body.appendChild(toast);
      setTimeout(() => {
        if (toast.parentNode) {
          toast.style.opacity = '0'; toast.style.transform = 'translateY(20px)';
          toast.style.transition = 'all 0.3s';
          setTimeout(() => toast.remove(), 300);
        }
      }, 4000);
    }

    // Confirm Bar
    function showConfirm(message, callback) {
      document.getElementById('confirmMsg').textContent = message;
      document.getElementById('confirmBar').classList.add('show');
      confirmCallback = callback;
      document.getElementById('confirmActionBtn').onclick = () => {
        hideConfirm();
        if (confirmCallback) confirmCallback();
      };
    }
    window.hideConfirm = function() {
      document.getElementById('confirmBar').classList.remove('show');
      confirmCallback = null;
    };

    // Format Date
    function fmtDate(ts) {
      if (!ts) return '—';
      try {
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) +
               ', ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      } catch(e) { return '—'; }
    }

    // Screenshot Modal
    window.viewScreenshot = function(base64) {
      if (!base64) return showToast('No Screenshot', 'This deposit has no screenshot', 'warning');
      document.getElementById('screenshotImg').src = base64;
      document.getElementById('screenshotModal').classList.add('show');
    };
    window.closeScreenshot = function() {
      document.getElementById('screenshotModal').classList.remove('show');
    };

    // Mobile menu
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      showConfirm('Are you sure you want to logout?', async () => {
        await signOut(auth);
        showToast('Logged Out', 'Redirecting...', 'success');
        setTimeout(() => window.location.href = 'admin-login.html', 1200);
      });
    });

    // Auth
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'admin-login.html'; return; }
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (!userDoc.exists() || userDoc.data().isAdmin !== true) {
          await signOut(auth);
          window.location.href = 'admin-login.html';
          return;
        }
        document.getElementById('sideName').textContent = userDoc.data().fullName || 'Admin';
        document.getElementById('sideAvatar').textContent = (userDoc.data().fullName || 'A').charAt(0).toUpperCase();
        await loadAllDeposits();
      } catch(e) { window.location.href = 'admin-login.html'; }
    });

    // Load Deposits
    async function loadAllDeposits() {
      allDeposits = [];
      try {
        const usersSnap = await getDocs(collection(db, 'users'));
        for (const userDoc of usersSnap.docs) {
          const userId = userDoc.id;
          const userData = userDoc.data();
          try {
            const depSnap = await getDocs(collection(db, `users/${userId}/deposits`));
            depSnap.forEach(d => {
              allDeposits.push({
                id: d.id,
                userId: userId,
                userName: userData.fullName || 'User',
                userUsername: userData.username || 'user',
                ...d.data()
              });
            });
          } catch(e) {}
        }

        allDeposits.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));

        // Update counts
        const pending = allDeposits.filter(d => d.status === 'pending').length;
        const approved = allDeposits.filter(d => d.status === 'approved' || d.status === 'completed').length;
        const rejected = allDeposits.filter(d => d.status === 'rejected').length;

        document.getElementById('countAll').textContent = allDeposits.length;
        document.getElementById('countPending').textContent = pending;
        document.getElementById('countApproved').textContent = approved;
        document.getElementById('countRejected').textContent = rejected;
        document.getElementById('sidePending').textContent = pending;

        renderTable();
      } catch(e) { console.error('Load error:', e); }
    }

    // Filter
    window.filterDeposits = function(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.filter-tab[data-filter="${filter}"]`).classList.add('active');
      renderTable();
    };

    // Render Table
    window.renderTable = function() {
      const search = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
      let filtered = allDeposits;

      if (currentFilter !== 'all') {
        if (currentFilter === 'approved') {
          filtered = filtered.filter(d => d.status === 'approved' || d.status === 'completed');
        } else {
          filtered = filtered.filter(d => d.status === currentFilter);
        }
      }

      if (search) {
        filtered = filtered.filter(d =>
          (d.userName || '').toLowerCase().includes(search) ||
          (d.userUsername || '').toLowerCase().includes(search) ||
          (d.id || '').toLowerCase().includes(search)
        );
      }

      const tbody = document.getElementById('tableBody');
      if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><i class="fas fa-inbox"></i><p>No deposits found</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(d => {
        const status = d.status || 'pending';
        const hasScreenshot = d.screenshotBase64 ? true : false;
        const isPending = status === 'pending';

        return `
          <tr>
            <td style="font-family:monospace;font-size:0.7rem;">${d.id?.substring(0,12)}...</td>
            <td>
              <div style="font-weight:600;font-size:0.78rem;">${d.userName}</div>
              <div style="font-size:0.65rem;color:#fb923c;">@${d.userUsername}</div>
            </td>
            <td style="font-weight:700;font-family:'Space Grotesk',monospace;">${fm(d.amount || 0)}</td>
            <td style="font-size:0.72rem;">${d.method || d.bankName || 'Transfer'}</td>
            <td style="font-size:0.75rem;">${d.senderName || '—'}</td>
            <td style="font-size:0.7rem;">${d.accountNumber || d.accountName || '—'}</td>
            <td style="font-size:0.7rem;color:var(--text3);">${fmtDate(d.createdAt)}</td>
            <td><span class="status-badge ${status}">${status}</span></td>
            <td>
              <div class="action-btns">
                ${hasScreenshot ? `<button class="action-btn view" onclick="viewScreenshot('${d.screenshotBase64}')"><i class="fas fa-image"></i> View</button>` : ''}
                ${isPending ? `<button class="action-btn approve" onclick="approveDeposit('${d.userId}','${d.id}',${d.amount || 0})"><i class="fas fa-check"></i> Approve</button>` : ''}
                ${isPending ? `<button class="action-btn reject" onclick="rejectDeposit('${d.userId}','${d.id}')"><i class="fas fa-times"></i> Reject</button>` : ''}
              </div>
            </td>
          </tr>
        `;
      }).join('');
    };

    // Approve
    window.approveDeposit = function(userId, depositId, amount) {
      showConfirm(`Approve deposit of ${fm(amount)}? This will credit the user's wallet.`, async () => {
        try {
          // Update deposit status
          await updateDoc(doc(db, `users/${userId}/deposits`, depositId), {
            status: 'approved',
            updatedAt: serverTimestamp()
          });

          // Credit wallet
          await updateDoc(doc(db, 'users', userId), {
            wallet: increment(amount),
            totalDeposits: increment(amount),
            updatedAt: serverTimestamp()
          });

          // Create transaction
          await setDoc(doc(collection(db, `users/${userId}/transactions`)), {
            type: 'deposit_approved',
            amount: amount,
            status: 'completed',
            description: `Deposit approved by admin (${depositId})`,
            depositId: depositId,
            createdAt: serverTimestamp()
          });

          // Update local data
          const idx = allDeposits.findIndex(d => d.id === depositId && d.userId === userId);
          if (idx >= 0) allDeposits[idx].status = 'approved';

          renderTable();
          showToast('Deposit Approved', `${fm(amount)} credited to user wallet`, 'success');
        } catch(e) {
          showToast('Error', e.message || 'Failed to approve deposit', 'error');
        }
      });
    };

    // Reject
    window.rejectDeposit = function(userId, depositId) {
      showConfirm('Reject this deposit? The user will NOT be credited.', async () => {
        try {
          await updateDoc(doc(db, `users/${userId}/deposits`, depositId), {
            status: 'rejected',
            updatedAt: serverTimestamp()
          });

          const idx = allDeposits.findIndex(d => d.id === depositId && d.userId === userId);
          if (idx >= 0) allDeposits[idx].status = 'rejected';

          renderTable();
          showToast('Deposit Rejected', 'Deposit request has been rejected', 'warning');
        } catch(e) {
          showToast('Error', e.message || 'Failed to reject deposit', 'error');
        }
      });
    };

    console.log('🛡️ Deposits Management Ready');
  </script>
</body>
</html>
