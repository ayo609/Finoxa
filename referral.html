<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Finoxa • Referral & Team</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1a1a1a;
      --orange: #f97316;
      --orange-light: #fb923c;
      --red: #ef4444;
      --amber: #f59e0b;
      --purple: #a855f7;
      --pink: #f472b6;
      --text: #ffffff;
      --text2: #a0a0a0;
      --text3: #666666;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.04);
      --l1-color: #fb923c;
      --l2-color: #fbbf24;
      --l3-color: #f472b6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 100px;
      -webkit-font-smoothing: antialiased;
    }

    /* Background effects */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 0% 0%, rgba(249,115,22,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 50%, rgba(239,68,68,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app-content {
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: 0 auto;
      padding: 1rem 1rem 100px;
    }

    /* Header bar */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 0;
      margin-bottom: 1.5rem;
    }

    .back-link {
      width: 42px;
      height: 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      text-decoration: none;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .back-link:hover { border-color: rgba(255,255,255,0.2); color: #fff; }

    .page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .page-title i { color: var(--orange-light); }

    .user-chip {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, rgba(249,115,22,0.2), rgba(239,68,68,0.15));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
    }

    /* Referral Link Banner */
    .ref-banner {
      background: linear-gradient(160deg, #1a1a1a 0%, #1f1f1f 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .ref-banner::after {
      content: '';
      position: absolute;
      width: 150px;
      height: 150px;
      background: rgba(249,115,22,0.06);
      border-radius: 50%;
      top: -40px;
      right: -40px;
      pointer-events: none;
    }

    .ref-banner-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .ref-link-row {
      display: flex;
      gap: 0.6rem;
      position: relative;
      z-index: 1;
    }

    .ref-input {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      color: var(--orange-light);
      font-family: 'Space Grotesk', monospace;
      font-size: 0.78rem;
      outline: none;
      min-width: 0;
    }

    .ref-copy-btn {
      padding: 0.8rem 1.2rem;
      background: linear-gradient(135deg, #f97316, #ef4444);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .ref-copy-btn:hover { transform: scale(1.03); }

    .share-btns {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.8rem;
      position: relative;
      z-index: 1;
    }

    .share-btn {
      flex: 1;
      padding: 0.6rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text2);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .share-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }

    /* Stats Overview */
    .stats-overview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.2rem;
    }

    .stat-card.full-width { grid-column: 1 / -1; }

    .stat-icon-sm {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      margin-bottom: 0.6rem;
    }

    .stat-icon-sm.orange { background: rgba(249,115,22,0.12); color: #fb923c; }
    .stat-icon-sm.amber { background: rgba(245,158,11,0.12); color: #fbbf24; }
    .stat-icon-sm.purple { background: rgba(168,85,247,0.12); color: #a78bfa; }

    .stat-value-lg {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
    }

    .stat-label-sm {
      font-size: 0.68rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    /* Level Breakdown - Horizontal cards */
    .section-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-label i { color: var(--orange-light); font-size: 0.9rem; }

    .level-cards {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .level-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .level-card:hover { border-color: rgba(255,255,255,0.15); }

    .level-card.active {
      border-color: var(--orange-light);
      background: rgba(249,115,22,0.05);
    }

    .level-card .lc-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 0 0 3px 3px;
    }

    .lc-bar.l1 { background: var(--l1-color); }
    .lc-bar.l2 { background: var(--l2-color); }
    .lc-bar.l3 { background: var(--l3-color); }

    .level-card .lc-count {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      margin: 0.5rem 0 0.2rem;
    }

    .lc-count.c1 { color: var(--l1-color); }
    .lc-count.c2 { color: var(--l2-color); }
    .lc-count.c3 { color: var(--l3-color); }

    .level-card .lc-level {
      font-size: 0.68rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .level-card .lc-rate {
      font-size: 0.75rem;
      font-weight: 700;
      margin-top: 0.2rem;
    }

    .lc-rate.r1 { color: var(--l1-color); }
    .lc-rate.r2 { color: var(--l2-color); }
    .lc-rate.r3 { color: var(--l3-color); }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: 1rem;
    }

    .search-input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: all 0.3s;
    }

    .search-input:focus { border-color: rgba(255,255,255,0.15); }

    .search-input::placeholder { color: var(--text3); }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 0.85rem;
    }

    /* Team member cards */
    .member-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .member-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem;
      transition: all 0.3s;
      animation: fadeSlide 0.3s ease both;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .member-card:hover { border-color: rgba(255,255,255,0.1); }

    .member-top-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .member-avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .member-avatar.av-l1 { background: linear-gradient(135deg, rgba(249,115,22,0.3), rgba(251,146,60,0.2)); color: #fb923c; }
    .member-avatar.av-l2 { background: linear-gradient(135deg, rgba(245,158,11,0.3), rgba(251,191,36,0.2)); color: #fbbf24; }
    .member-avatar.av-l3 { background: linear-gradient(135deg, rgba(244,114,182,0.3), rgba(251,146,60,0.2)); color: #f472b6; }

    .member-info { flex: 1; min-width: 0; }

    .member-name {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 0.15rem;
    }

    .member-username {
      font-size: 0.72rem;
      color: var(--orange-light);
      font-weight: 500;
    }

    .member-level-badge {
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-l1 { background: rgba(249,115,22,0.12); color: #fb923c; }
    .badge-l2 { background: rgba(245,158,11,0.12); color: #fbbf24; }
    .badge-l3 { background: rgba(244,114,182,0.12); color: #f472b6; }

    .member-details {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border2);
    }

    .detail-item {
      text-align: center;
    }

    .detail-value {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .detail-value.green { color: #4ade80; }
    .detail-value.amber { color: #fbbf24; }

    .detail-label {
      font-size: 0.62rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 0.15rem;
    }

    .member-joined {
      font-size: 0.65rem;
      color: var(--text3);
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .member-status {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
      font-size: 0.6rem;
      font-weight: 700;
      margin-left: 0.5rem;
    }

    .status-active { background: rgba(34,197,94,0.1); color: #4ade80; }
    .status-inactive { background: rgba(239,68,68,0.1); color: #f87171; }

    /* Empty state */
    .empty-box {
      text-align: center;
      padding: 3rem 1rem;
    }

    .empty-box .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.2;
    }

    .empty-box h4 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 0.3rem;
    }

    .empty-box p {
      font-size: 0.8rem;
      color: var(--text3);
    }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 2rem;
      color: var(--text3);
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20,20,20,0.95);
      backdrop-filter: blur(25px);
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 0.5rem 0.7rem;
      display: flex;
      gap: 0.2rem;
      z-index: 200;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .nav-item {
      padding: 0.5rem 0.9rem;
      border-radius: 40px;
      color: var(--text2);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .nav-item i { font-size: 0.95rem; }
    .nav-item.active,
    .nav-item:hover {
      background: linear-gradient(135deg, rgba(249,115,22,0.2), rgba(239,68,68,0.1));
      color: #fff;
    }

    .nav-item span { display: none; }

    @media (min-width: 500px) {
      .nav-item span { display: inline; }
    }

    @media (max-width: 400px) {
      .member-details { grid-template-columns: 1fr 1fr; }
      .level-cards { grid-template-columns: 1fr 1fr 1fr; gap: 0.4rem; }
    }
  </style>
</head>
<body>

  <div class="app-content">
    
    <!-- Header -->
    <div class="page-header">
      <a href="dashboard.html" class="back-link">
        <i class="fas fa-arrow-left"></i>
      </a>
      <div class="page-title">
        <i class="fas fa-users"></i> Team & Referrals
      </div>
      <div class="user-chip" id="userChip">F</div>
    </div>

    <!-- Referral Link Banner -->
    <div class="ref-banner">
      <div class="ref-banner-label">
        <i class="fas fa-link"></i> Your Referral Link
      </div>
      <div class="ref-link-row">
        <input type="text" class="ref-input" id="refLinkInput" readonly value="Loading...">
        <button class="ref-copy-btn" id="copyLinkBtn">
          <i class="fas fa-copy"></i> Copy
        </button>
      </div>
      <div class="share-btns">
        <button class="share-btn" id="shareWaBtn">
          <i class="fab fa-whatsapp"></i> WhatsApp
        </button>
        <button class="share-btn" id="shareTgBtn">
          <i class="fab fa-telegram"></i> Telegram
        </button>
        <button class="share-btn" id="shareMoreBtn">
          <i class="fas fa-share-alt"></i> More
        </button>
      </div>

    <!-- Stats Overview -->
    <div class="stats-overview">
      <div class="stat-card">
        <div class="stat-icon-sm orange"><i class="fas fa-users"></i></div>
        <div class="stat-value-lg" id="totalTeam">0</div>
        <div class="stat-label-sm">Total Members</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-sm amber"><i class="fas fa-user-check"></i></div>
        <div class="stat-value-lg" id="activeMembers">0</div>
        <div class="stat-label-sm">Active (₦10k+)</div>
      </div>
      <div class="stat-card full-width">
        <div class="stat-icon-sm purple"><i class="fas fa-chart-bar"></i></div>
        <div class="stat-value-lg" id="totalInvested">₦0</div>
        <div class="stat-label-sm">Total Team Investment</div>
      </div>
    </div>

    <!-- Level Breakdown -->
    <div class="section-label">
      <i class="fas fa-layer-group"></i> Level Breakdown
    </div>
    <div class="level-cards">
      <div class="level-card active" id="levelCard1" onclick="switchLevel(1)">
        <div class="lc-bar l1"></div>
        <div class="lc-count c1" id="l1Count">0</div>
        <div class="lc-level">Level 1</div>
        <div class="lc-rate r1">20% Bonus</div>
      </div>
      <div class="level-card" id="levelCard2" onclick="switchLevel(2)">
        <div class="lc-bar l2"></div>
        <div class="lc-count c2" id="l2Count">0</div>
        <div class="lc-level">Level 2</div>
        <div class="lc-rate r2">3% Bonus</div>
      </div>
      <div class="level-card" id="levelCard3" onclick="switchLevel(3)">
        <div class="lc-bar l3"></div>
        <div class="lc-count c3" id="l3Count">0</div>
        <div class="lc-level">Level 3</div>
        <div class="lc-rate r3">1% Bonus</div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <i class="fas fa-search search-icon"></i>
      <input type="text" class="search-input" id="searchInput" placeholder="Search team members..." oninput="renderTeam()">
    </div>

    <!-- Team List -->
    <div class="member-list" id="memberList">
      <div class="loading-state">
        <i class="fas fa-spinner fa-spin"></i> Loading team...
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="plans.html" class="nav-item"><i class="fas fa-layer-group"></i><span>Plans</span></a>
    <a href="investment.html" class="nav-item"><i class="fas fa-rocket"></i><span>Invest</span></a>
    <a href="referral.html" class="nav-item active"><i class="fas fa-users"></i><span>Referral</span></a>
    <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
  </div>

  <script type="module">
    // 🔥 FIREBASE IMPORTS
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, getDocs, collection, query, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // 🔥 FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyAYw02OLQ-AOun_0YLzTd7DaCLsHQqHxGk",
      authDomain: "finexo-3afc7.firebaseapp.com",
      projectId: "finexo-3afc7",
      storageBucket: "finexo-3afc7.firebasestorage.app",
      messagingSenderId: "443358513817",
      appId: "1:443358513817:web:756f9aa5e02dc05ca84608"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const RATES = { 1: 20, 2: 3, 3: 1 };
    const MIN_ACTIVE = 10000;
    const fm = (v) => "₦" + Number(v || 0).toLocaleString();

    let currentUserId = null;
    let myUsername = '';
    let myReferralLink = '';
    let allTeamMembers = [];
    let currentLevel = 1;

    // 🔥 Format date
    function formatDate(ts) {
      if (!ts) return '—';
      try {
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) +
               ' at ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      } catch(e) { return '—'; }
    }

    // 🔥 Get user's total invested from activePlans
    async function getUserInvested(userId) {
      try {
        const snap = await getDocs(collection(db, `users/${userId}/activePlans`));
        let total = 0;
        snap.forEach(d => total += Number(d.data().capital || 0));
        return total;
      } catch(e) { return 0; }
    }

    // 🔥 Get referral earnings for a specific downline
    async function getReferralEarnings(downlineId) {
      try {
        const refDoc = await getDoc(doc(db, `users/${currentUserId}/referrals`, downlineId));
        return refDoc.exists ? (refDoc.data().totalEarned || 0) : 0;
      } catch(e) { return 0; }
    }

    // 🔥 Build enriched member object
    async function enrichMember(userData, level) {
      const invested = await getUserInvested(userData.uid);
      const earned = await getReferralEarnings(userData.uid);
      const isActive = invested >= MIN_ACTIVE;

      return {
        uid: userData.uid,
        fullName: userData.fullName || 'Unknown',
        username: userData.username || 'user',
        email: userData.email || 'N/A',
        phone: userData.phone || '',
        level: level,
        invested: invested,
        earned: earned,
        isActive: isActive,
        joinedAt: userData.createdAt || null,
        totalDeposits: userData.totalDeposits || 0,
        totalEarnings: userData.totalEarnings || 0
      };
    }

    // 🔥 BUILD TEAM from users collection
    function buildTeamFromUsers(allUsers) {
      const l1 = [], l2 = [], l3 = [];

      for (const user of allUsers) {
        if (user.referredBy === currentUserId) {
          l1.push(user);
        }
        if (user.level2Referrer === currentUserId) {
          l2.push(user);
        }
        if (user.level3Referrer === currentUserId) {
          l3.push(user);
        }
      }

      return { l1, l2, l3 };
    }

    // 🔥 LOAD ALL DATA
    async function loadTeamData() {
      try {
        // Get all users
        const allSnap = await getDocs(collection(db, 'users'));
        const allUsers = [];
        allSnap.forEach(d => {
          allUsers.push({ uid: d.id, ...d.data() });
        });

        // Build team levels
        const { l1, l2, l3 } = buildTeamFromUsers(allUsers);

        // Enrich all members
        allTeamMembers = [];
        for (const u of l1) allTeamMembers.push(await enrichMember(u, 1));
        for (const u of l2) allTeamMembers.push(await enrichMember(u, 2));
        for (const u of l3) allTeamMembers.push(await enrichMember(u, 3));

        // Update stats
        const l1List = allTeamMembers.filter(m => m.level === 1);
        const l2List = allTeamMembers.filter(m => m.level === 2);
        const l3List = allTeamMembers.filter(m => m.level === 3);

        const totalInvested = allTeamMembers.reduce((s, m) => s + m.invested, 0);
        const activeCount = allTeamMembers.filter(m => m.isActive).length;

        document.getElementById('totalTeam').textContent = allTeamMembers.length;
        document.getElementById('activeMembers').textContent = activeCount;
        document.getElementById('totalInvested').textContent = fm(totalInvested);
        document.getElementById('l1Count').textContent = l1List.length;
        document.getElementById('l2Count').textContent = l2List.length;
        document.getElementById('l3Count').textContent = l3List.length;

        console.log('✅ Team loaded:', allTeamMembers.length, 'members');
        console.log('   L1:', l1List.length, 'L2:', l2List.length, 'L3:', l3List.length);

        // Render
        renderTeam();

      } catch(e) {
        console.error('❌ Team load error:', e);
        document.getElementById('memberList').innerHTML = `
          <div class="empty-box">
            <div class="empty-icon">⚠️</div>
            <h4>Error Loading Team</h4>
            <p>Please refresh the page</p>
          </div>`;
      }
    }

    // 🔥 SWITCH LEVEL
    window.switchLevel = function(level) {
      currentLevel = level;
      // Update active card
      document.querySelectorAll('.level-card').forEach(c => c.classList.remove('active'));
      document.getElementById('levelCard' + level).classList.add('active');
      renderTeam();
    };

    // 🔥 RENDER TEAM LIST
    function renderTeam() {
      const searchQuery = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
      const container = document.getElementById('memberList');

      // Filter by level
      let filtered = allTeamMembers.filter(m => m.level === currentLevel);

      // Filter by search
      if (searchQuery) {
        filtered = filtered.filter(m =>
          m.fullName.toLowerCase().includes(searchQuery) ||
          m.username.toLowerCase().includes(searchQuery) ||
          m.email.toLowerCase().includes(searchQuery)
        );
      }

      if (!filtered.length) {
        container.innerHTML = `
          <div class="empty-box">
            <div class="empty-icon">👥</div>
            <h4>${searchQuery ? 'No Results Found' : 'No Level ' + currentLevel + ' Members'}</h4>
            <p>${searchQuery ? 'Try a different search term' : 'Share your referral link to start building your team!'}</p>
          </div>`;
        return;
      }

      container.innerHTML = '';

      filtered.forEach((member, index) => {
        const joinedStr = formatDate(member.joinedAt);
        const avatarClass = 'av-l' + member.level;
        const badgeClass = 'badge-l' + member.level;
        const card = document.createElement('div');
        card.className = 'member-card';
        card.style.animationDelay = (index * 0.05) + 's';

        card.innerHTML = `
          <div class="member-top-row">
            <div class="member-avatar ${avatarClass}">${member.fullName.charAt(0).toUpperCase()}</div>
            <div class="member-info">
              <div class="member-name">${member.fullName}</div>
              <div class="member-username">@${member.username}</div>
            </div>
            <div class="member-level-badge ${badgeClass}">
              Level ${member.level} · ${RATES[member.level]}%
            </div>
          </div>

          <div class="member-details">
            <div class="detail-item">
              <div class="detail-value green">${fm(member.invested)}</div>
              <div class="detail-label">Invested</div>
            </div>
            <div class="detail-item">
              <div class="detail-value amber">${fm(member.totalDeposits)}</div>
              <div class="detail-label">Deposits</div>
            </div>
            <div class="detail-item">
              <div class="detail-value green">+${fm(member.earned)}</div>
              <div class="detail-label">Your Earnings</div>
            </div>
          </div>

          <div class="member-joined">
            <i class="far fa-clock"></i> Joined: ${joinedStr}
            <span class="member-status ${member.isActive ? 'status-active' : 'status-inactive'}">
              ${member.isActive ? 'Active' : 'Inactive'}
            </span>
          </div>
        `;

        container.appendChild(card);
      });
    }

    // 🔥 AUTH STATE
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      currentUserId = user.uid;

      try {
        const userDoc = await getDoc(doc(db, 'users', currentUserId));
        if (!userDoc.exists()) { window.location.href = 'login.html'; return; }

        const ud = userDoc.data();
        myUsername = ud.username || currentUserId.substring(0, 8);
        myReferralLink = `${window.location.origin}/register.html?ref=${myUsername}`;

        // Update UI
        document.getElementById('userChip').textContent = (ud.fullName || 'F').charAt(0).toUpperCase();
        document.getElementById('refLinkInput').value = myReferralLink;

        // Load team
        await loadTeamData();

      } catch(e) {
        console.error('Auth error:', e);
      }
    });

    // 🔥 COPY LINK
    document.getElementById('copyLinkBtn').addEventListener('click', () => {
      navigator.clipboard?.writeText(myReferralLink).then(() => {
        Swal.fire({ icon: 'success', title: 'Copied!', toast: true, timer: 2000, showConfirmButton: false, position: 'top-end' });
      }).catch(() => {
        const el = document.createElement('textarea');
        el.value = myReferralLink;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        Swal.fire({ icon: 'success', title: 'Copied!', toast: true, timer: 2000 });
      });
    });

    // 🔥 SHARE BUTTONS
    document.getElementById('shareWaBtn').addEventListener('click', () => {
      window.open(`https://wa.me/?text=${encodeURIComponent('🚀 Join Finoxa and earn daily returns!\n\n' + myReferralLink)}`, '_blank');
    });

    document.getElementById('shareTgBtn').addEventListener('click', () => {
      window.open(`https://t.me/share/url?url=${encodeURIComponent(myReferralLink)}&text=${encodeURIComponent('Join Finoxa - Smart Wealth Platform!')}`, '_blank');
    });

    document.getElementById('shareMoreBtn').addEventListener('click', () => {
      if (navigator.share) {
        navigator.share({ title: 'Finoxa', text: 'Join Finoxa and earn daily!', url: myReferralLink });
      } else {
        document.getElementById('copyLinkBtn').click();
      }
    });

    // 🔥 Expose renderTeam globally
    window.renderTeam = renderTeam;

    console.log('✅ Finoxa Referral Page Ready');
  </script>
</body>
</html>
